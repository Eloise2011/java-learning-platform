    "summary": "Lambda syntax, @FunctionalInterface, Predicate/Function/Consumer/Supplier, method references, higher-order functions.",
    "lesson": "\n<h4>Introduction: Behavior as a First-Class Citizen</h4>\n<p>For most of Java's history, the only way to pass behavior to a method was to wrap it in an object — typically an anonymous inner class implementing a single-method interface. This was so verbose that many developers avoided the functional patterns (strategy, callback, command) that are elegant in other languages. Java 8's lambdas changed this fundamentally: you can now pass a function as easily as you pass a String. This single feature enabled the Streams API, revolutionized testing (mocking with lambdas vs verbose anonymous classes), and made event-driven and reactive programming idiomatic in Java.</p>\n\n<h4>Lambda Syntax: From Verbose to Elegant</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// Pre-Java-8: Anonymous inner class — 6 lines of ceremony for 1 line of logic</span>\nbutton.addActionListener(<span class='kw'>new</span> <span class='tp'>ActionListener</span>() {\n    @Override\n    <span class='kw'>public void</span> <span class='mt'>actionPerformed</span>(<span class='tp'>ActionEvent</span> e) {\n        System.out.println(<span class='st'>\"Clicked!\"</span>);\n    }\n});\n\n<span class='cm'>// Java 8+: Lambda — 1 line, clear, focused on what matters</span>\nbutton.addActionListener(e -> System.out.println(<span class='st'>\"Clicked!\"</span>));</pre></div>\n\n<p>The compiler infers types from context (the target functional interface), so you rarely need to declare them. A lambda can be assigned to any variable whose type is a functional interface:</p>\n\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// Full form — types declared, block body, explicit return</span>\n(<span class='tp'>int</span> a, <span class='tp'>int</span> b) -> { <span class='kw'>return</span> a + b; }\n\n<span class='cm'>// Type inference, expression body (implicit return)</span>\n(a, b) -> a + b\n\n<span class='cm'>// Single parameter, no parentheses needed</span>\ns -> s.toUpperCase()\n\n<span class='cm'>// No parameters — empty parentheses required</span>\n() -> System.currentTimeMillis()</pre></div>\n\n<h4>The Standard Functional Interfaces — Know These Four</h4>\n<p>java.util.function contains 43 functional interfaces, but four cover 90% of use cases:</p>\n<table class='meta-table'>\n  <tr><th>Interface</th><th>Method</th><th>Input</th><th>Output</th><th>When to Use</th></tr>\n  <tr><td><code>Predicate&lt;T&gt;</code></td><td><code>test(T)</code></td><td>T</td><td>boolean</td><td>Filtering, validation, conditions</td></tr>\n  <tr><td><code>Function&lt;T,R&gt;</code></td><td><code>apply(T)</code></td><td>T</td><td>R</td><td>Transformation, mapping, conversion</td></tr>\n  <tr><td><code>Consumer&lt;T&gt;</code></td><td><code>accept(T)</code></td><td>T</td><td>void</td><td>Side effects: printing, logging, storing</td></tr>\n  <tr><td><code>Supplier&lt;T&gt;</code></td><td><code>get()</code></td><td>none</td><td>T</td><td>Lazy creation, factories, defaults</td></tr>\n</table>\n<p>For each, there are specialized versions for primitives (IntPredicate, LongFunction, DoubleConsumer), binary versions (BiFunction, BiPredicate), and operator versions for same-type operations (UnaryOperator, BinaryOperator). Prefer these standard interfaces over creating your own — they make your APIs interoperable with the entire Java ecosystem.</p>\n\n<h4>Method References: When a Lambda Just Calls an Existing Method</h4>\n<p>Method references are syntactic sugar for lambdas that do nothing but call an existing method. They're more readable and sometimes enable compiler optimizations:</p>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// Static method</span>\ns -> Integer.parseInt(s)       →  Integer::parseInt\n\n<span class='cm'>// Instance method on a SPECIFIC object</span>\ns -> System.out.println(s)     →  System.out::println\n\n<span class='cm'>// Instance method on the ARBITRARY object that will be passed</span>\ns -> s.toUpperCase()           →  String::toUpperCase\n\n<span class='cm'>// Constructor</span>\n() -> new ArrayList<>()       →  ArrayList::new</pre></div>\n\n<h4>Lambda vs Anonymous Class: Semantic Differences</h4>\n<p>While lambdas look like shorthand for anonymous classes, there are meaningful differences: (1) <code>this</code> in a lambda refers to the enclosing class instance (not the lambda itself), while in an anonymous class it refers to the anonymous class instance; (2) lambdas cannot introduce new instance variables; (3) lambdas are implemented via <code>invokedynamic</code> (a JVM instruction for dynamic language support, introduced in Java 7), not as separate class files, making them more memory-efficient. For most purposes, lambdas are the right choice.</p>\n\n<h4>Composing Functions: andThen, compose, and Predicate Combinators</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='tp'>Function</span>&lt;String, String&gt; trim = String::trim;\n<span class='tp'>Function</span>&lt;String, String&gt; upper = String::toUpperCase;\n<span class='tp'>Function</span>&lt;String, String&gt; trimAndUpper = trim.andThen(upper);  <span class='cm'>// trim, then uppercase</span>\n\n<span class='tp'>Predicate</span>&lt;String&gt; notEmpty = s -> !s.isEmpty();\n<span class='tp'>Predicate</span>&lt;String&gt; startsWithA = s -> s.startsWith(<span class='st'>\"A\"</span>);\n<span class='tp'>Predicate</span>&lt;String&gt; valid = notEmpty.and(startsWithA);   <span class='cm'>// Both conditions</span>\n<span class='tp'>Predicate</span>&lt;String&gt; invalid = valid.negate();               <span class='cm'>// Logical NOT</span></pre></div>\n<div class='key-point'><strong>Lambdas changed Java.</strong> They enable passing behavior as data, which in turn enables the Streams API, composable predicates, dependency injection of strategies, and reactive programming. Use method references when possible (cleaner, potentially faster). Lambdas should be short — if one exceeds 3-5 lines, extract it into a named method. The four core functional interfaces (Predicate, Function, Consumer, Supplier) should be in every Java developer's mental toolbox.</div>\n",

    "lesson": "\n<h4>Introduction: Think in Pipelines, Not Loops</h4>\n<p>The Streams API (Java 8+, 2014) is a declarative way to process sequences of data. Instead of writing nested loops with mutable accumulators and if-else filters, you describe <em>what</em> you want — \"filter these, transform those, collect the results\" — and the library handles iteration, temporary storage, and optimization. Streams make data processing code shorter, clearer, less error-prone, and <em>automatically parallelizable</em> (just change <code>.stream()</code> to <code>.parallelStream()</code>). The API was inspired by functional languages (Haskell, ML) and SQL — if you've written <code>SELECT name FROM users WHERE age > 18 ORDER BY name</code>, you already understand the streams paradigm.</p>\n\n<h4>The Stream Pipeline: Source → Intermediate Operations → Terminal Operation</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='kw'>var</span> adultNames = people.stream()                       <span class='cm'>// 1. SOURCE — create stream from collection</span>\n    .filter(p -> p.age() >= 18)                       <span class='cm'>// 2. INTERMEDIATE (lazy) — keep only adults</span>\n    .map(Person::name)                                <span class='cm'>//    INTERMEDIATE (lazy) — extract names</span>\n    .map(String::toUpperCase)                         <span class='cm'>//    INTERMEDIATE (lazy) — uppercase</span>\n    .sorted()                                         <span class='cm'>//    INTERMEDIATE (lazy) — sort alphabetically</span>\n    .distinct()                                       <span class='cm'>//    INTERMEDIATE (lazy) — remove duplicates</span>\n    .limit(10)                                        <span class='cm'>//    INTERMEDIATE (lazy) — take first 10</span>\n    .collect(Collectors.toList());                    <span class='cm'>// 3. TERMINAL — triggers execution!</span></pre></div>\n\n<p><strong>The most important concept in streams: lazy evaluation.</strong> NO work happens until the terminal operation is called. The intermediate operations (filter, map, sorted, distinct, limit, etc.) merely build a pipeline — a recipe for processing. Only when you call a terminal operation (collect, forEach, count, findFirst, etc.) does the pipeline execute. This laziness enables optimization: the stream implementation can fuse operations (filter + map done in a single pass), short-circuit (stop after finding one match), and avoid creating intermediate collections (each element flows through the entire pipeline before the next element starts).</p>\n\n<h4>Streams Are Single-Use — Like Real Streams</h4>\n<p>After a terminal operation, a stream is <strong>consumed</strong> — it cannot be reused. Attempting to operate on a consumed stream throws <code>IllegalStateException: stream has already been operated upon or closed</code>. This is analogous to an Iterator that has been exhausted. To process the same data again, create a new stream from the source. This single-use design is what enables the lazy, fused execution model — the stream doesn't store elements, it processes them on-the-fly.</p>\n\n<h4>Terminal Operations — The Ones You'll Actually Use</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// Collect — materialize stream elements into a data structure</span>\nstream.collect(Collectors.toList());              <span class='cm'>// List (mutable)</span>\nstream.toList();                                   <span class='cm'>// List (immutable, Java 16+)</span>\nstream.collect(Collectors.toSet());               <span class='cm'>// Set (unique elements)</span>\nstream.collect(Collectors.toMap(                  <span class='cm'>// Map — must handle duplicate keys!</span>\n    Person::id,                                   <span class='cm'>// Key mapper</span>\n    Function.identity(),                          <span class='cm'>// Value mapper</span>\n    (existing, replacement) -> replacement));     <span class='cm'>// Merge function for duplicates</span>\n\n<span class='cm'>// Reduce — combine all elements into a single result</span>\nstream.reduce(0, Integer::sum);                   <span class='cm'>// Sum: 0 + a + b + c + ...</span>\nstream.reduce(Integer::max);                      <span class='cm'>// Maximum (returns Optional)</span>\nstream.count();                                   <span class='cm'>// Count elements</span>\n\n<span class='cm'>// Match — check predicates across elements (short-circuiting)</span>\nstream.anyMatch(p -> p.age() > 65);               <span class='cm'>// At least one senior?</span>\nstream.allMatch(p -> p.age() > 0);                <span class='cm'>// All have positive age?</span>\nstream.noneMatch(p -> p.name().isBlank());         <span class='cm'>// No blank names?</span>\n\n<span class='cm'>// Find — retrieve a specific element (short-circuiting)</span>\nstream.findFirst();                                <span class='cm'>// First element (returns Optional)</span>\nstream.findAny();                                  <span class='cm'>// Any element (faster in parallel streams)</span></pre></div>\n\n<h4>groupingBy — The Closest Thing to SQL's GROUP BY in Java</h4>\n<p><code>Collectors.groupingBy()</code> classifies stream elements into groups based on a classifier function, returning a <code>Map&lt;Key, List&lt;Element&gt;&gt;</code>. With downstream collectors, you can aggregate each group — count, sum, average, or further classify:</p>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// Group employees by department → Map&lt;Department, List&lt;Employee&gt;&gt;</span>\n<span class='kw'>var</span> byDept = employees.stream()\n    .collect(Collectors.groupingBy(Employee::department));\n\n<span class='cm'>// Group + count → Map&lt;Department, Long&gt;</span>\n<span class='kw'>var</span> countByDept = employees.stream()\n    .collect(Collectors.groupingBy(\n        Employee::department,\n        Collectors.counting()));  <span class='cm'>// Downstream collector: count each group</span>\n\n<span class='cm'>// Group + multiple aggregations → Map&lt;Department, DoubleSummaryStatistics&gt;</span>\n<span class='kw'>var</span> salaryStats = employees.stream()\n    .collect(Collectors.groupingBy(\n        Employee::department,\n        Collectors.summarizingDouble(Employee::salary)));  <span class='cm'>// count, sum, min, avg, max</span>\n\n<span class='cm'>// Multi-level grouping (like SQL GROUP BY dept, city)</span>\n<span class='kw'>var</span> byDeptAndCity = employees.stream()\n    .collect(Collectors.groupingBy(\n        Employee::department,\n        Collectors.groupingBy(Employee::city)));  <span class='cm'>// Map&lt;Dept, Map&lt;City, List&lt;Employee&gt;&gt;&gt;</span></pre></div>\n\n<h4>When NOT to Use Streams (Bloch, Item 45)</h4>\n<p>Streams are powerful but not universal. Avoid them when:</p>\n<ul>\n  <li><strong>You need to modify local variables</strong> from within the lambda. Streams should be side-effect-free — modifying shared state breaks the functional model and causes data races in parallel streams.</li>\n  <li><strong>You need to throw checked exceptions</strong> from lambdas (functional interfaces don't declare checked exceptions — you'll need awkward try-catch blocks inside lambdas).</li>\n  <li><strong>The logic involves complex branching</strong> (deeply nested if-else chains read better as plain for-loops).</li>\n  <li><strong>You need access to the loop index</strong> (which iteration you're on). Streams deliberately hide the index.</li>\n  <li><strong>The pipeline is simple enough</strong> that a plain for-each loop is clearer. Readability beats cleverness every time.</li>\n</ul>\n\n<div class='key-point'><strong>Streams in one paragraph:</strong> Streams are functional (side-effect-free), lazy (nothing happens until terminal), and single-use (consumed after terminal operation). They're ideal for filter-map-reduce pipelines. Use groupingBy for classification. Never modify shared state inside stream operations — this violates the functional contract. Parallel streams (<code>.parallelStream()</code>) are NOT always faster — they have overhead and should only be used when you've measured that the workload justifies parallelism. A clear for-each loop beats a tangled stream pipeline. Use streams when they make the code <em>more</em> readable, not as a default replacement for all loops.</div>\n",

    "summary": "Optional for absent values, map/flatMap/filter on Optional, orElse/orElseGet/orElseThrow.",
    "lesson": "\n<h4>Introduction: The Billion-Dollar Mistake and Its Cure</h4>\n<p>In 1965, computer scientist Tony Hoare added null references to the ALGOL W programming language. It was, in his own words decades later, a \"billion-dollar mistake.\" The problem with null is not that it exists — it's that null is <strong>semantically ambiguous</strong>. Does it mean \"not found\"? \"not yet initialized\"? \"intentionally absent\"? \"an error occurred\"? The type system provides no way to distinguish. Java's <code>Optional&lt;T&gt;</code> class (Java 8+) addresses this by making absence <em>explicit in the type system</em>. A method returning <code>Optional&lt;User&gt;</code> declares \"I may not return a result\" in its signature, forcing callers to confront this possibility — rather than discovering it through a NullPointerException in production.</p>\n\n<h4>Optional Makes Absence Part of the Type Signature</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// BAD: null is invisible. The type signature says \"returns User\" — it LIES.</span>\n<span class='kw'>public</span> <span class='tp'>User</span> <span class='mt'>findUser</span>(<span class='tp'>String</span> id) {\n    <span class='kw'>return</span> database.get(id);  <span class='cm'>// Might return null — caller can't know from the signature</span>\n}\n\n<span class='cm'>// Caller forgets null check → NullPointerException in production → on-call page at 3 AM</span>\n<span class='tp'>String</span> name = findUser(<span class='st'>\"42\"</span>).getName();  <span class='cm'>// NPE if user not found — BUG</span>\n\n<span class='cm'>// GOOD: Optional makes absence explicit. The type signature is HONEST.</span>\n<span class='kw'>public</span> <span class='tp'>Optional</span>&lt;User&gt; <span class='mt'>findUser</span>(<span class='tp'>String</span> id) {\n    <span class='kw'>return</span> Optional.ofNullable(database.get(id));\n}\n\n<span class='cm'>// Caller MUST handle the possibility of absence — the type forces thought</span>\n<span class='tp'>String</span> name = findUser(<span class='st'>\"42\"</span>)\n    .map(User::getName)\n    .orElse(<span class='st'>\"Unknown User\"</span>);  <span class='cm'>// Safe — absence is handled explicitly</span></pre></div>\n\n<h4>Creating Optionals — Three Ways</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// of() — value MUST be non-null. Throws NPE immediately if null (fail-fast).</span>\nOptional.of(someValue);\n\n<span class='cm'>// ofNullable() — returns Optional.empty() if value is null. Safe — no NPE.</span>\nOptional.ofNullable(mightBeNull);\n\n<span class='cm'>// empty() — explicitly empty. Better than null — it's a valid Optional object.</span>\nOptional.empty();</pre></div>\n\n<h4>Extracting Values — Safe and Unsafe Ways</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// orElse(T) — returns default if Optional is empty</span>\n<span class='cm'>// WARNING: the default is ALWAYS evaluated, even if Optional is present!</span>\n<span class='tp'>String</span> name = optName.orElse(getDefaultName());  <span class='cm'>// getDefaultName() called REGARDLESS!</span>\n\n<span class='cm'>// orElseGet(Supplier) — LAZY default. Supplier called ONLY if empty. PREFER THIS.</span>\n<span class='tp'>String</span> name = optName.orElseGet(() -> fetchDefaultFromDatabase());  <span class='cm'>// Lazy — only if needed</span>\n\n<span class='cm'>// orElseThrow(Supplier) — throw if empty. Better than get() — you control the exception.</span>\n<span class='tp'>User</span> user = optUser.orElseThrow(() -> <span class='kw'>new</span> <span class='tp'>UserNotFoundException</span>(id));\n\n<span class='cm'>// ifPresent(Consumer) — execute side effect only if value exists</span>\noptResult.ifPresent(result -> System.out.println(<span class='st'>\"Result: \"</span> + result));\n\n<span class='cm'>// ifPresentOrElse (Java 9+) — handle both presence AND absence</span>\noptUser.ifPresentOrElse(\n    user -> System.out.println(user.name()),\n    () -> System.out.println(<span class='st'>\"No user found\"</span>)\n);\n\n<span class='cm'>// DANGEROUS: get() — throws NoSuchElementException if empty. Just as bad as NPE!</span>\n<span class='cm'>// User user = optUser.get();  ← NEVER USE WITHOUT isPresent() CHECK</span></pre></div>\n\n<h4>Transforming Optionals — map, flatMap, filter</h4>\n<p>The real power of Optional comes from chaining transformations without writing if-null checks:</p>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// map — transform the value if present. Returns Optional of the transformed type.</span>\n<span class='tp'>Optional</span>&lt;String&gt; upperName = findUser(id).map(User::getName).map(String::toUpperCase);\n\n<span class='cm'>// flatMap — when the transformation itself returns Optional.</span>\n<span class='cm'>// Prevents Optional&lt;Optional&lt;X&gt;&gt; — flattens to Optional&lt;X&gt;</span>\n<span class='tp'>Optional</span>&lt;String&gt; managerName = findEmployee(email)      <span class='cm'>// Optional&lt;Employee&gt;</span>\n    .flatMap(Employee::getDepartment)                    <span class='cm'>// Optional&lt;Department&gt;</span>\n    .flatMap(Department::getManager)                     <span class='cm'>// Optional&lt;Employee&gt;</span>\n    .map(Employee::getName);                             <span class='cm'>// Optional&lt;String&gt;</span>\n\n<span class='cm'>// filter — conditionally keep or discard the value</span>\n<span class='tp'>Optional</span>&lt;User&gt; adult = findUser(id).filter(u -> u.getAge() >= 18);</pre></div>\n<p>This fluent chaining is the idiomatic way to handle potentially-absent values in modern Java. It reads like a pipeline: \"find the user, get their department, get its manager, get the manager's name. If any step returns empty, the whole chain returns empty.\" No if-null checks. No early returns. Clean, composable, safe.</p>\n\n<h4>The Rules of Optional — When to Use (and Not Use) It</h4>\n<p>From Bloch and the JDK designers:</p>\n<ul>\n  <li><strong>DO use Optional as a return type</strong> for methods that may not return a value. This is the primary, intended use case.</li>\n  <li><strong>DO use orElseGet()</strong> for expensive defaults (lazy evaluation) and orElse() for cheap, constant defaults.</li>\n  <li><strong>DON'T use Optional.get()</strong> without checking presence. It throws NoSuchElementException — the same class of bug as NPE, but now with two exception types to debug instead of one. Use orElseThrow() for a meaningful exception.</li>\n  <li><strong>DON'T use Optional as a field type</strong> (not Serializable by default, adds memory overhead — an extra object for every Optional field). Use null for fields and Optional for return types.</li>\n  <li><strong>DON'T use Optional as a method parameter</strong> — it forces callers to wrap values unnecessarily. Overload the method instead (one version with the parameter, one without).</li>\n  <li><strong>DON'T return null from a method that returns Optional</strong> — return Optional.empty(). This should be obvious but defensive codebases with mixed null/Optional conventions are common.</li>\n  <li><strong>DON'T use Optional in collections</strong> (e.g., <code>List&lt;Optional&lt;String&gt;&gt;</code>). Collections already model absence (empty collection), and Optional elements add indirection without benefit.</li>\n</ul>\n\n<div class='key-point'><strong>Optional is a return-type concept, not a general-purpose null replacement.</strong> It communicates \"this method may not produce a result\" through the type system, transforming runtime NullPointerExceptions into compile-time obligations to handle absence. Use it on method return types. Chain transformations with map/flatMap/filter. Never call get() — use orElse, orElseGet, or orElseThrow. The goal is not to eliminate null from Java (that's impossible) but to make the places where null can appear explicit and unambiguous.</div>\n",

// ===== LOCAL STORAGE =====
const STORAGE_KEY = 'java-learning-platform-progress';
const QUIZ_STORAGE_KEY = 'java-learning-quiz-answers';
var quizAnswers = {};
var currentView = 'welcome';  // 'welcome' | 'topic' | 'progress' | 'sitemap'
var API_BASE = 'http://localhost:5001/api';
var apiOnline = false;

function apiFetch(path, options) {
    if (!options) options = {};
    return fetch(API_BASE + path, options).then(function(r) {
        if (!r.ok) throw new Error('API ' + r.status);
        apiOnline = true;
        return r.json();
    }).catch(function(e) {
        apiOnline = false;
        throw e;
    });
}

// Sync all local state to the server
function syncToServer() {
    if (!apiOnline) return;
    // Sync completed topics
    var completed = Array.from(STATE.completedTopics);
    completed.forEach(function(tid) {
        apiFetch('/progress/' + tid, { method: 'POST' }).catch(function(){});
    });
    // Sync quiz answers
    for (var t in quizAnswers) {
        apiFetch('/quiz/' + t, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({answers: quizAnswers[t]}) }).catch(function(){});
    }
}

function loadProgress() {
    // Try API first
    apiFetch('/progress').then(function(data) {
        if (data.completedTopicIds && data.completedTopicIds.length > 0) {
            STATE.completedTopics = new Set(data.completedTopicIds);
            renderSidebar();
            if (STATE.currentTopicId) {
                var t = getTopicById(STATE.currentTopicId);
                if (t) { renderLesson(t); renderPractice(t); renderProgressTab(t); }
            }
        }
    }).catch(function() {
        // Fall back to localStorage
        try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                var data = JSON.parse(raw);
                if (Array.isArray(data.completedTopics)) {
                    STATE.completedTopics = new Set(data.completedTopics);
                }
            }
        } catch (e) {}
    });
}

function saveProgress() {
    const data = { completedTopics: Array.from(STATE.completedTopics) };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadQuizAnswers() {
    // Try API first for each topic that has progress
    var completed = Array.from(STATE.completedTopics);
    var fetched = 0;
    if (completed.length > 0) {
        completed.forEach(function(tid) {
            apiFetch('/quiz/' + tid).then(function(data) {
                if (data.answers && Object.keys(data.answers).length > 0) {
                    if (!quizAnswers[tid]) quizAnswers[tid] = {};
                    for (var qi in data.answers) {
                        quizAnswers[tid][qi] = data.answers[qi];
                    }
                }
                fetched++;
            }).catch(function() { fetched++; });
        });
    }
    // Also load from localStorage as immediate fallback
    try { var r = localStorage.getItem(QUIZ_STORAGE_KEY); if (r) { var local = JSON.parse(r); for (var t in local) { if (!quizAnswers[t]) quizAnswers[t] = local[t]; else { for (var q in local[t]) { if (!quizAnswers[t][q]) quizAnswers[t][q] = local[t][q]; } } } } } catch(e) {}
}
function saveQuizAnswers() {
    localStorage.setItem(QUIZ_STORAGE_KEY, JSON.stringify(quizAnswers));
}
function saveQuizAnswer(topicId, qi, selected, correct) {
    if (!quizAnswers[topicId]) quizAnswers[topicId] = {};
    quizAnswers[topicId][qi] = { selectedOption: selected, isCorrect: correct };
    saveQuizAnswers();
    // Sync to server
    var body = {}; body[qi] = { selectedOption: selected, isCorrect: correct };
    apiFetch('/quiz/' + topicId, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({answers: body}) }).catch(function(){});
}
function getQuizAnswer(topicId, qi) {
    return (quizAnswers[topicId] && quizAnswers[topicId][qi] !== undefined) ? quizAnswers[topicId][qi] : null;
}

// ===== HELPER: group topics by phase =====
function getTopicsByPhase() {
    var map = {};
    for (var i = 0; i < CURRICULUM.length; i++) {
        var t = CURRICULUM[i];
        if (!map[t.phase]) map[t.phase] = [];
        map[t.phase].push(t);
    }
    var phases = Object.keys(map);
    for (var j = 0; j < phases.length; j++) {
        map[phases[j]].sort(function(a, b) { return a.id - b.id; });
    }
    return map;
}

function getTopicById(id) {
    for (var i = 0; i < CURRICULUM.length; i++) {
        if (CURRICULUM[i].id === id) return CURRICULUM[i];
    }
    return null;
}

function getNextTopicId(currentId) {
    for (var i = 0; i < CURRICULUM.length - 1; i++) {
        if (CURRICULUM[i].id === currentId) return CURRICULUM[i + 1].id;
    }
    return null;
}

function getPrevTopicId(currentId) {
    for (var i = 1; i < CURRICULUM.length; i++) {
        if (CURRICULUM[i].id === currentId) return CURRICULUM[i - 1].id;
    }
    return null;
}

// ===== SIDEBAR RENDERING =====
function renderSidebar() {
    var nav = document.getElementById('sidebar-nav');
    var topicsByPhase = getTopicsByPhase();
    var phaseOrder = Object.keys(PHASES);

    var html = '';
    for (var pi = 0; pi < phaseOrder.length; pi++) {
        var phaseName = phaseOrder[pi];
        var meta = PHASES[phaseName];
        var topics = topicsByPhase[phaseName] || [];
        var phaseHours = 0;
        for (var ti = 0; ti < topics.length; ti++) {
            phaseHours += topics[ti].hours;
        }
        var isExpanded = STATE.expandedPhases.has(phaseName);

        html += '<button class="phase-toggle ' + meta.cssClass + (isExpanded ? '' : ' collapsed') + '" data-phase="' + escapeHTML(phaseName) + '">';
        html += '<span class="arrow">▼</span>';
        html += '<span class="phase-icon">' + meta.icon + '</span>';
        html += '<span class="phase-name">' + escapeHTML(phaseName) + '</span>';
        html += '<span class="phase-meta">' + topics.length + ' topics · ' + phaseHours + 'h</span>';
        html += '</button>';

        html += '<div class="topic-list' + (isExpanded ? '' : ' collapsed') + '" data-phase-list="' + escapeHTML(phaseName) + '">';
        if (topics.length > 0) {
            for (var ti2 = 0; ti2 < topics.length; ti2++) {
                var topic = topics[ti2];
                var isActive = STATE.currentTopicId === topic.id;
                var isCompleted = STATE.completedTopics.has(topic.id);
                var itemClass = 'topic-item';
                if (isActive) itemClass += ' active';
                if (isCompleted) itemClass += ' completed';

                html += '<button class="' + itemClass + '" data-topic-id="' + topic.id + '">';
                html += '<span class="t-num">' + topic.id + '</span>';
                html += '<span class="t-title">' + escapeHTML(topic.title) + '</span>';
                html += '<span class="t-badges">';
                html += renderBadges(topic);
                html += '</span>';
                html += '</button>';
            }
        } else {
            html += '<div style="padding:8px 32px;font-size:0.73rem;color:var(--text3);font-style:italic">Coming soon</div>';
        }
        html += '</div>';
    }

    nav.innerHTML = html;
    updateSidebarStats();
}

function renderBadges(topic) {
    var badges = '';
    var compClass = { 'beginner': 'badge-d-b', 'intermediate': 'badge-d-i', 'advanced': 'badge-d-a' };
    var compLabel = { 'beginner': 'beg', 'intermediate': 'int', 'advanced': 'adv' };
    badges += '<span class="badge ' + (compClass[topic.complexity] || 'badge-d-b') + '">' + (compLabel[topic.complexity] || topic.complexity) + '</span>';
    var impClass = { 'critical': 'badge-i-c', 'important': 'badge-i-i', 'nice': 'badge-i-n' };
    badges += '<span class="badge ' + (impClass[topic.importance] || 'badge-i-i') + '">' + topic.importance + '</span>';
    return badges;
}

function renderWelcome() {
    var total = CURRICULUM.length, phases = Object.keys(PHASES).length, hasC = 0, hrs = 0, bp = {};
    for (var i = 0; i < CURRICULUM.length; i++) {
        var t = CURRICULUM[i]; hrs += t.hours;
        if (!bp[t.phase]) bp[t.phase] = []; bp[t.phase].push(t);
    }
    for (var p in PHASES) { if (bp[p] && bp[p].length > 0) hasC++; }
    var s = document.getElementById('welcome-subtitle');
    if (s) s.textContent = total + ' topics across ' + hasC + ' active phases (' + phases + ' planned).';
    var g = document.getElementById('welcome-summary-grid');
    if (g) g.innerHTML = '<div class="summary-card"><div class="sc-val">' + hasC + '/' + phases + '</div><div class="sc-label">Phases Active</div></div>' +
        '<div class="summary-card"><div class="sc-val">' + total + '</div><div class="sc-label">Topics</div></div>' +
        '<div class="summary-card"><div class="sc-val">~' + hrs + 'h</div><div class="sc-label">Duration</div></div>';
}

function updateSidebarStats() {
    var completed = STATE.completedTopics.size;
    var total = CURRICULUM.length;
    var pct = total > 0 ? Math.round(completed / total * 100) : 0;
    document.getElementById('sb-completed').textContent = completed;
    document.getElementById('sb-total').textContent = total;
    document.getElementById('sb-percent').textContent = pct + '%';
}

// ===== SIDEBAR CLICK HANDLER =====
document.getElementById('sidebar-nav').addEventListener('click', function(e) {
    var toggle = e.target.closest('.phase-toggle');
    if (toggle) {
        var phaseName = toggle.dataset.phase;
        if (STATE.expandedPhases.has(phaseName)) {
            STATE.expandedPhases.delete(phaseName);
        } else {
            STATE.expandedPhases.add(phaseName);

        return;

    var topicItem = e.target.closest('.topic-item');
    if (topicItem) {
        var topicId = parseInt(topicItem.dataset.topicId);
        if (!isNaN(topicId)) {

        }
    }
});

// ===== TAB SWITCHING =====
function initTabs() {
    var tabsEl = document.querySelector('.tabs');
    if (tabsEl) {
        tabsEl.addEventListener('click', function(e) {
            var tab = e.target.closest('.tab');
            if (!tab) return;
            switchTab(tab.dataset.tab);
        });
    }
}

function switchTab(tabName) {
    var tabs = document.querySelectorAll('.tab');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    var sections = document.querySelectorAll('.lesson-section');
    for (var j = 0; j < sections.length; j++) sections[j].classList.remove('active');

    var tab = document.querySelector('[data-tab="' + tabName + '"]');
    var section = document.getElementById('tab-' + tabName);
    if (tab) tab.classList.add('active');
    if (section) section.classList.add('active');

    if (tabName === 'sitemap' && STATE.currentTopicId) {
        var mel = document.querySelector('#tab-sitemap .mermaid');
        if (mel && !mel.querySelector('svg')) {
            initMermaid();
            if (typeof mermaid !== 'undefined') {
                setTimeout(function() {
                    try { mermaid.run({ querySelector: '#tab-sitemap .mermaid' }); }
                    catch(e) { mel.innerHTML = '<p style="color:var(--text3);padding:20px">Diagram failed to render.</p>'; }
                }, 100);
            }
        }
    }
}

    html += '<div class="textbook-ref"><strong>📖 Textbook:</strong> <em>' + escapeHTML(topic.textbook) + '</em></div>';
    html += topic.lesson;

// ===== PRACTICE RENDERING =====
function renderPractice(topic) {
    var container = document.getElementById('tab-practice');
    var html = '';

    if (topic.quiz && topic.quiz.length > 0) {
        html += '<h3>📝 Quiz: ' + escapeHTML(topic.title) + '</h3>';
        for (var qi = 0; qi < topic.quiz.length; qi++) {
            var q = topic.quiz[qi];
            var prev = getQuizAnswer(topic.id, qi);
            html += '<div class="quiz-question" id="quiz-' + topic.id + '-' + qi + '">';
            html += '<h4>Q' + (qi + 1) + '. ' + escapeHTML(q.question) + '</h4>';
            for (var oi = 0; oi < q.options.length; oi++) {
                var cls = 'quiz-option';
                var dis = '';
                if (prev) {
                    dis = ' disabled';
                    if (oi === q.correct) cls += ' correct';
                    else if (oi === prev.selectedOption && !prev.isCorrect) cls += ' wrong';
                }
                html += '<button class="' + cls + '"' + dis + ' onclick="checkAnswer(' + topic.id + ',' + qi + ',' + oi + ')" data-topic="' + topic.id + '" data-q="' + qi + '" data-o="' + oi + '">';
                html += escapeHTML(q.options[oi]);
                html += '</button>';
            }
            html += '<div class="quiz-feedback" id="quiz-fb-' + topic.id + '-' + qi + '"';
            if (prev) {
                html += ' class="show ' + (prev.isCorrect ? 'correct' : 'wrong') + '"';
                html += '>' + (prev.isCorrect ? '✓ Correct! ' : '✗ Incorrect. ') + escapeHTML(q.explanation) + '</div>';
            } else {
                html += '></div>';
            }
            html += '</div>';
        }
    } else {
        html += '<h3>📝 Practice</h3><p style="color:var(--text3)">No quiz for this topic.</p>';
    }

    if (topic.codingExercise && topic.codingExercise.instruction) {
        var ex = topic.codingExercise;
        html += '<div class="coding-exercise" style="margin-top:20px">';
        html += '<h4>💻 Coding Exercise</h4>';
        html += '<p style="color:var(--text2);line-height:1.6">' + escapeHTML(ex.instruction) + '</p>';
        if (ex.hint) {
            html += '<div class="hint" id="hint-' + topic.id + '" style="display:none">💡 Hint: ' + escapeHTML(ex.hint) + '</div>';
            html += '<button class="secondary" onclick="document.getElementById(\'hint-' + topic.id + '\').style.display=\'block\'" style="margin-bottom:8px;padding:6px 14px;background:transparent;border:1px solid var(--surface3);color:var(--text2);border-radius:6px;cursor:pointer;font-family:var(--font);font-size:0.8rem">Show Hint</button>';
        }
        html += '<textarea id="exercise-input-' + topic.id + '" placeholder="Write your solution here..."></textarea>';
        html += '<button onclick="checkExercise(' + topic.id + ')">✓ Check</button>';
        html += '<div class="check-result" id="exercise-result-' + topic.id + '"></div>';
        html += '</div>';
    }

    html += '<div style="margin-top:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">';
    if (STATE.completedTopics.has(topic.id)) {
        html += '<button class="complete-btn" disabled>✓ Completed</button>';
    } else {
        html += '<button class="complete-btn" onclick="markComplete(' + topic.id + ')">✓ Mark Complete</button>';
    }
    var prevId = getPrevTopicId(topic.id);
    var nextId = getNextTopicId(topic.id);
    if (prevId !== null) {
        html += '<button class="secondary" onclick="selectTopic(' + prevId + ')" style="padding:8px 16px;background:transparent;border:1px solid var(--surface3);color:var(--text2);border-radius:6px;cursor:pointer;font-family:var(--font)">← Previous</button>';
    }
    if (nextId !== null) {
        html += '<button class="secondary" onclick="selectTopic(' + nextId + ')" style="padding:8px 16px;background:transparent;border:1px solid var(--surface3);color:var(--text2);border-radius:6px;cursor:pointer;font-family:var(--font)">Next →</button>';
    }
    html += '</div>';

    container.innerHTML = html;
}

// ===== PROGRESS TAB =====
function renderProgressTab(topic) {
    var container = document.getElementById('tab-progress-view');
    var topicsByPhase = getTopicsByPhase();
    var phaseOrder = Object.keys(PHASES);

    var html = '<h3>📊 Your Progress</h3>';

    var completed = STATE.completedTopics.size;
    var total = CURRICULUM.length;
    var pct = total > 0 ? Math.round(completed / total * 100) : 0;
    var completedHours = 0;
    var totalHours = 0;
    for (var i = 0; i < CURRICULUM.length; i++) {
        totalHours += CURRICULUM[i].hours;
        if (STATE.completedTopics.has(CURRICULUM[i].id)) {
            completedHours += CURRICULUM[i].hours;
        }
    }

    html += '<div class="stats-grid">';
    html += '<div class="stat-card"><div class="stat-value">' + completed + '/' + total + '</div><div class="stat-label">Topics Done</div></div>';
    html += '<div class="stat-card"><div class="stat-value">' + pct + '%</div><div class="stat-label">Complete</div></div>';
    html += '<div class="stat-card"><div class="stat-value">' + completedHours + '/' + totalHours + 'h</div><div class="stat-label">Hours</div></div>';
    html += '<div class="stat-card"><div class="stat-value">' + (STATE.completedTopics.has(topic.id) ? '✓' : '—') + '</div><div class="stat-label">This Topic</div></div>';
    html += '</div>';

    for (var pi = 0; pi < phaseOrder.length; pi++) {
        var phaseName = phaseOrder[pi];
        var meta = PHASES[phaseName];
        var topics = topicsByPhase[phaseName] || [];
        if (topics.length === 0) continue;
        var phaseCompleted = 0;
        for (var ti = 0; ti < topics.length; ti++) {
            if (STATE.completedTopics.has(topics[ti].id)) phaseCompleted++;
        }
        var phasePct = Math.round(phaseCompleted / topics.length * 100);
        html += '<div class="phase-progress">';
        html += '<h4>' + meta.icon + ' ' + escapeHTML(phaseName) + ' — ' + phaseCompleted + '/' + topics.length + ' topics</h4>';
        html += '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + phasePct + '%;background:' + meta.color + '"></div></div>';
        html += '</div>';
    }

    html += '<div class="reminder-panel"><h4 style="margin:0 0 10px 0;font-size:0.85rem">✅ Completed Topics</h4>';
    if (completed === 0) {
        html += '<p style="color:var(--text3);font-size:0.8rem">None yet. Start working through the curriculum!</p>';
    } else {
        html += '<ul>';
        for (var ci = 0; ci < CURRICULUM.length; ci++) {
            if (STATE.completedTopics.has(CURRICULUM[ci].id)) {
                html += '<li>' + escapeHTML(CURRICULUM[ci].title) + ' <span class="ok">✓</span></li>';
            }
        }
        html += '</ul>';
    }
    html += '</div>';

    if (completed > 0) {
        html += '<button class="reset-btn" onclick="resetAllProgress()">⚠ Reset All Progress</button>';
    }

    container.innerHTML = html;
}

// ===== QUIZ LOGIC =====
function checkAnswer(topicId, questionIndex, selectedOption) {
    var topic = getTopicById(topicId);
    if (!topic || !topic.quiz || questionIndex >= topic.quiz.length) return;

    var q = topic.quiz[questionIndex];
    var isCorrect = selectedOption === q.correct;

    var questionEl = document.getElementById('quiz-' + topicId + '-' + questionIndex);
    if (!questionEl) return;
    var options = questionEl.querySelectorAll('.quiz-option');
    for (var i = 0; i < options.length; i++) {
        options[i].disabled = true;
    }

    for (var j = 0; j < options.length; j++) {
        if (j === q.correct) {
            options[j].classList.add('correct');
        } else if (j === selectedOption && !isCorrect) {
            options[j].classList.add('wrong');
        }
    }

    saveQuizAnswer(topicId, questionIndex, selectedOption, isCorrect);
    saveQuizAnswer(topicId, questionIndex, selectedOption, isCorrect);
    var fb = document.getElementById('quiz-fb-' + topicId + '-' + questionIndex);
    if (fb) {
        fb.textContent = (isCorrect ? '✓ Correct! ' : '✗ Incorrect. ') + q.explanation;
        fb.classList.add('show', isCorrect ? 'correct' : 'wrong');
    }
    var rb = document.createElement('button');
    rb.textContent = 'Try Again';
    rb.style.cssText = 'margin-top:8px;padding:6px 14px;background:transparent;border:1px solid var(--surface3);color:var(--text2);border-radius:6px;cursor:pointer;font-family:var(--font);font-size:0.78rem';
    rb.onclick = function(e) {
        e.stopPropagation();
        var os = questionEl.querySelectorAll('.quiz-option');
        for (var k = 0; k < os.length; k++) { os[k].disabled = false; os[k].classList.remove('correct', 'wrong'); }
        fb.classList.remove('show', 'correct', 'wrong'); fb.textContent = '';
        if (rb.parentNode) rb.remove();
        if (quizAnswers[topicId]) { delete quizAnswers[topicId][questionIndex]; saveQuizAnswers(); }
    };
    fb.appendChild(rb);
}

// ===== CODING EXERCISE LOGIC =====
function checkExercise(topicId) {
    var topic = getTopicById(topicId);
    if (!topic || !topic.codingExercise) return;

    var ex = topic.codingExercise;
    var input = document.getElementById('exercise-input-' + topicId);
    var result = document.getElementById('exercise-result-' + topicId);
    if (!input || !result) return;

    var text = input.value.trim();
    if (text.length < 10) {
        result.textContent = '✗ Please write a more complete solution before checking.';
        result.className = 'check-result show fail';
        return;
    }

    var keywords = ex.checkKeywords || [];
    var textLower = text.toLowerCase();
    var found = [];
    var missing = [];

    for (var i = 0; i < keywords.length; i++) {
        if (textLower.indexOf(keywords[i].toLowerCase()) !== -1) {
            found.push(keywords[i]);
        } else {
            missing.push(keywords[i]);
        }
    }

    var pct = keywords.length > 0 ? Math.round(found.length / keywords.length * 100) : 100;
    if (pct >= 80) {
        result.textContent = '✓ Great! Found ' + found.length + '/' + keywords.length + ' key concepts: ' + found.join(', ') + (missing.length > 0 ? '. Missing: ' + missing.join(', ') : '');
        result.className = 'check-result show pass';
    } else if (pct >= 40) {
        result.textContent = '⚠ Getting there. Found: ' + found.join(', ') + '. Missing: ' + missing.join(', ') + '. Review the lesson and try again.';
        result.className = 'check-result show fail';
    } else {
        result.textContent = '✗ Keep working. Try to include these concepts: ' + keywords.join(', ');
        result.className = 'check-result show fail';
    }
}

// ===== COMPLETION LOGIC =====
function markComplete(id) {
    STATE.completedTopics.add(id);
    saveProgress();
    apiFetch('/progress/' + id, { method: 'POST' }).catch(function(){});
    var topic = getTopicById(id);
    showToast('✓ Completed: ' + topic.title, 'success');

    if (currentView === 'topic') {
        renderLesson(topic);
        renderPractice(topic);
        renderExtraTab(topic);
        renderEnhancementsTab(topic);
    }
    if (currentView === 'progress') renderAppProgress();
    renderSidebar();

    var nextId = getNextTopicId(id);
    if (nextId !== null && STATE.completedTopics.size < CURRICULUM.length) {
        setTimeout(function() {
            if (STATE.currentTopicId === id) {
                selectTopic(nextId);
                showToast('→ Advanced to next topic', 'info');
            }
        }, 800);
    } else if (nextId === null && STATE.completedTopics.size === CURRICULUM.length) {
        setTimeout(function() {
            showToast('🎉 All topics completed! Amazing work!', 'success');
        }, 800);
    }
}

function unmarkComplete(id) {
    STATE.completedTopics.delete(id);
    saveProgress();
    apiFetch('/progress/' + id, { method: 'DELETE' }).catch(function(){});
    var topic = getTopicById(id);
    showToast('↩ Marked incomplete: ' + topic.title, 'warn');
    if (currentView === 'topic') {
        renderLesson(topic);
        renderPractice(topic);
        renderExtraTab(topic);
        renderEnhancementsTab(topic);
    }
    if (currentView === 'progress') renderAppProgress();
    renderSidebar();
}

function resetAllProgress() {
    if (confirm('Reset all progress? This cannot be undone.')) {
        STATE.completedTopics.clear();
        saveProgress();
        // Update any visible view
        if (currentView === 'progress') renderAppProgress();
        if (currentView === 'topic' && STATE.currentTopicId) {
            var ct = getTopicById(STATE.currentTopicId);
            if (ct) { renderLesson(ct); renderPractice(ct); renderExtraTab(ct); renderEnhancementsTab(ct); }
        }
        renderSidebar();
        showToast('All progress reset', 'warn');
    }
}

// ===== TOAST NOTIFICATIONS =====
var toastTimeout = null;

function showToast(message, type) {
    var container = document.getElementById('toast-container');
    if (!container) return;

    if (toastTimeout) clearTimeout(toastTimeout);
    container.innerHTML = '';

    var toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'info');
    toast.textContent = message;
    container.appendChild(toast);

    toastTimeout = setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(function() { if (toast.parentNode) toast.remove(); }, 300);
    }, 3500);
}

// ===== UTILITY =====
function escapeHTML(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}

// ===== EXTRA-CURRICULUM RESOURCES =====
var RESOURCES_KEY = 'java-learning-resources';
var topicResources = {};  // { topicId: [{type, title, url, addedAt}] }

function loadResources() {
    try {
        var raw = localStorage.getItem(RESOURCES_KEY);
        if (raw) { topicResources = JSON.parse(raw); }
    } catch(e) { topicResources = {}; }
}

function saveResources() {
    localStorage.setItem(RESOURCES_KEY, JSON.stringify(topicResources));
}

function addResource(topicId, type, title, author, url) {
    if (!topicResources[topicId]) topicResources[topicId] = [];
    topicResources[topicId].push({
        type: type,
        title: title.trim(),
        author: author.trim(),
        url: url.trim(),
        addedAt: new Date().toISOString()
    });
    saveResources();
    // Sync to server
    apiFetch('/resources/' + topicId, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({type: type, title: title.trim(), author: author.trim(), url: url.trim()}) }).catch(function(){});
    var topic = getTopicById(topicId);
    if (topic) renderExtraTab(topic);
    showToast('Resource added: ' + title, 'success');
}

function removeResource(topicId, index) {
    if (topicResources[topicId] && topicResources[topicId][index]) {
        var resId = topicResources[topicId][index].id;
        topicResources[topicId].splice(index, 1);
        saveResources();
        if (resId) apiFetch('/resources/' + resId, { method: 'DELETE' }).catch(function(){});
        var topic = getTopicById(topicId);
        if (topic) renderExtraTab(topic);
        showToast('Resource removed', 'warn');
    }
}

function renderExtraTab(topic) {
    var container = document.getElementById('tab-extra');
    if (!container) return;

    var html = '<h3>📚 Extra-Curriculum Resources</h3>';
    html += '<p style="color:var(--text2);margin-bottom:14px;font-size:0.85rem">Attach books, articles, podcasts, and videos for deeper learning on this topic.</p>';

    // Add resource form
    html += '<div class="resource-form">';
    html += '<select id="res-type-' + topic.id + '">';
    html += '<option value="book">📖 Book</option>';
    html += '<option value="link">🔗 Article/Link</option>';
    html += '<option value="podcast">🎙️ Podcast</option>';
    html += '<option value="video">🎬 Video</option>';
    html += '</select>';
    html += '<input type="text" id="res-title-' + topic.id + '" placeholder="Title/Description" style="min-width:200px">';
    html += '<input type="text" id="res-author-' + topic.id + '" placeholder="Author (optional)" style="min-width:150px">';
    html += '<input type="text" id="res-url-' + topic.id + '" placeholder="URL (https://...)" style="min-width:250px">';
    html += '<button onclick="submitResource(' + topic.id + ')">+ Add</button>';
    html += '</div>';

    // List existing resources
    var resources = topicResources[topic.id] || [];
    if (resources.length === 0) {
        html += '<p style="color:var(--text3);font-size:0.82rem;font-style:italic">No resources added yet. Add your first one above!</p>';
    } else {
        html += '<ul class="resource-list">';
        for (var i = 0; i < resources.length; i++) {
            var r = resources[i];
            var typeClass = 'res-type-' + r.type;
            var icon = {book: '📖', link: '🔗', podcast: '🎙️', video: '🎬'}[r.type] || '📎';
            html += '<li>';
            html += '<span class="res-type ' + typeClass + '">' + icon + ' ' + r.type + '</span>';
            var label = escapeHTML(r.title);
            if (r.author) { label += ' <span style="color:var(--text3);font-size:0.75rem;font-weight:400">by ' + escapeHTML(r.author) + '</span>'; }
            if (r.url) {
                html += '<a href="' + escapeHTML(r.url) + '" target="_blank" rel="noopener">' + label + '</a>';
            } else {
                html += '<span style="flex:1">' + label + '</span>';
            }
            html += '<button class="res-del" onclick="removeResource(' + topic.id + ', ' + i + ')" title="Remove">✕</button>';
            html += '</li>';
        }
        html += '</ul>';
    }

    container.innerHTML = html;
}

function submitResource(topicId) {
    var typeEl = document.getElementById('res-type-' + topicId);
    var titleEl = document.getElementById('res-title-' + topicId);
    var authorEl = document.getElementById('res-author-' + topicId);
    var urlEl = document.getElementById('res-url-' + topicId);
    if (!typeEl || !titleEl) return;

    var type = typeEl.value;
    var title = titleEl.value.trim();
    var author = (authorEl ? authorEl.value.trim() : '');
    var url = (urlEl ? urlEl.value.trim() : '');

    if (!title) {
        showToast('Please enter a title or description', 'warn');
        return;
    }
    if (url) {
        try { var pu = new URL(url); if (pu.protocol !== 'http:' && pu.protocol !== 'https:') { showToast('URL must start with http:// or https://', 'warn'); return; } }
        catch(e) { showToast('Please enter a valid URL', 'warn'); return; }
    }
    addResource(topicId, type, title, author, url);

    // Clear inputs
    titleEl.value = '';
    if (authorEl) authorEl.value = '';
    if (urlEl) urlEl.value = '';
}

// ===== ENHANCEMENTS / REVIEWS =====
var ENHANCEMENTS_KEY = 'java-learning-enhancements';
var topicEnhancements = {};  // { topicId: [{comment, submittedAt}] }

function loadEnhancements() {
    try {
        var raw = localStorage.getItem(ENHANCEMENTS_KEY);
        if (raw) { topicEnhancements = JSON.parse(raw); }
    } catch(e) { topicEnhancements = {}; }
}

function saveEnhancements() {
    localStorage.setItem(ENHANCEMENTS_KEY, JSON.stringify(topicEnhancements));
}

function submitEnhancement(topicId) {
    var textarea = document.getElementById('enhancement-input-' + topicId);
    if (!textarea) return;
    var comment = textarea.value.trim();
    if (!comment) {
        showToast('Please write a comment or suggestion', 'warn');
        return;
    }

    if (!topicEnhancements[topicId]) topicEnhancements[topicId] = [];
    topicEnhancements[topicId].push({
        comment: comment,
        submittedAt: new Date().toISOString()
    });
    saveEnhancements();
    textarea.value = '';

    var topic = getTopicById(topicId);
    if (topic) renderEnhancementsTab(topic);
    showToast('Enhancement submitted! This will be reviewed for future updates.', 'success');
}

function renderEnhancementsTab(topic) {
    var container = document.getElementById('tab-enhancements');
    if (!container) return;

    var html = '<h3>💬 Lesson Enhancements</h3>';
    html += '<p style="color:var(--text2);margin-bottom:14px;font-size:0.85rem">Notice something missing, incorrect, or needing more detail? Submit your feedback here. Each submission will be reviewed and the lesson content updated accordingly.</p>';

    // Input form
    html += '<div class="enhancement-form">';
    html += '<textarea id="enhancement-input-' + topic.id + '" placeholder="e.g., This lesson should cover X in more detail... The explanation of Y is incorrect because... Add an example for Z..."></textarea>';
    html += '<button onclick="submitEnhancement(' + topic.id + ')">📤 Submit for Review</button>';
    html += '</div>';

    // Previous enhancements
    var enhancements = topicEnhancements[topic.id] || [];
    if (enhancements.length > 0) {
        html += '<h4 style="margin-top:18px;margin-bottom:8px;font-size:0.9rem">📝 Previous Feedback (' + enhancements.length + ')</h4>';
        for (var i = enhancements.length - 1; i >= 0; i--) {
            var e = enhancements[i];
            var date = new Date(e.submittedAt);
            var dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
            html += '<div class="enhancement-item">';
            html += '<p style="line-height:1.5;color:var(--text)">' + escapeHTML(e.comment) + '</p>';
            html += '<div class="enh-meta">📅 ' + dateStr + ' · Status: <span style="color:var(--warning)">Pending Review</span></div>';
            html += '</div>';
        }
    }

    container.innerHTML = html;
}

function initMermaid() {

            startOnLoad: false, 
            theme: 'neutral',
            securityLevel: 'strict',
            flowchart: { useMaxWidth: true, htmlLabels: false, curve: 'basis' }
        });
        mermaidInitialized = true;
    }
}

    var container = document.getElementById('tab-sitemap');

    lines.push('    F2["<b>Phase 2</b><br/>Developer Tools<br/><i>(coming soon)</i>"]');

// ===== APP-LEVEL PROGRESS VIEW =====
function renderAppProgress() {
    var container = document.getElementById('app-view-progress');
    if (!container) return;
    var topicsByPhase = getTopicsByPhase();
    var phaseOrder = Object.keys(PHASES);
    var completed = STATE.completedTopics.size;
    var total = CURRICULUM.length;
    var pct = total > 0 ? Math.round(completed / total * 100) : 0;
    var completedHours = 0, totalHours = 0;
    for (var i = 0; i < CURRICULUM.length; i++) {
        totalHours += CURRICULUM[i].hours;
        if (STATE.completedTopics.has(CURRICULUM[i].id)) completedHours += CURRICULUM[i].hours;
    }

    var html = '<h3>📊 Overall Learning Progress</h3>';
    html += '<div class="stats-grid">';
    html += '<div class="stat-card"><div class="stat-value">' + completed + '/' + total + '</div><div class="stat-label">Topics Completed</div></div>';
    html += '<div class="stat-card"><div class="stat-value">' + pct + '%</div><div class="stat-label">Overall Complete</div></div>';
    html += '<div class="stat-card"><div class="stat-value">' + completedHours + '/' + totalHours + 'h</div><div class="stat-label">Study Hours</div></div>';
    html += '<div class="stat-card"><div class="stat-value">' + Object.keys(PHASES).length + '</div><div class="stat-label">Total Phases</div></div>';
    html += '</div>';

    // Per-phase breakdown
    for (var pi = 0; pi < phaseOrder.length; pi++) {
        var phaseName = phaseOrder[pi];
        var meta = PHASES[phaseName];
        var topics = topicsByPhase[phaseName] || [];
        var phaseCompleted = 0, phaseHours = 0;
        for (var ti = 0; ti < topics.length; ti++) {
            phaseHours += topics[ti].hours;
            if (STATE.completedTopics.has(topics[ti].id)) phaseCompleted++;
        }
        var phasePct = topics.length > 0 ? Math.round(phaseCompleted / topics.length * 100) : 0;
        html += '<div class="phase-progress">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
        html += '<h4 style="margin:0">' + meta.icon + ' ' + escapeHTML(phaseName) + '</h4>';
        html += '<span style="font-size:0.78rem;color:var(--text2)">' + phaseCompleted + '/' + topics.length + ' topics' + (topics.length === 0 ? ' <em style="color:var(--text3)">(coming soon)</em>' : '') + '</span>';
        html += '</div>';
        html += '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + phasePct + '%;background:' + meta.color + '"></div></div>';
        html += '</div>';
    }

    // Completed topics list
    html += '<div class="reminder-panel"><h4 style="margin:0 0 10px 0;font-size:0.85rem">✅ Completed Topics</h4>';
    if (completed === 0) {
        html += '<p style="color:var(--text3);font-size:0.8rem">None yet. Select a topic from the sidebar to begin learning!</p>';
    } else {
        html += '<ul>';
        for (var ci = 0; ci < CURRICULUM.length; ci++) {
            var ct = CURRICULUM[ci];
            if (STATE.completedTopics.has(ct.id)) {
                html += '<li style="cursor:pointer" onclick="selectTopic(' + ct.id + ')">' + escapeHTML(ct.title) + ' <span class="ok">✓</span></li>';
            }
        }
        html += '</ul>';
    }
    html += '</div>';

    if (completed > 0) {
        html += '<button class="reset-btn" onclick="resetAllProgress()" style="margin-top:12px">⚠ Reset All Progress</button>';
    }

    container.innerHTML = html;
}

// ===== APP-LEVEL SITEMAP VIEW =====

    var container = document.getElementById('app-view-sitemap');
    if (!container) return;

    html += '<p style="color:var(--text2);margin-bottom:14px;font-size:0.85rem">Bird\u2019s-eye view of the complete Java ecosystem. Click any topic in the sidebar to see it highlighted here.</p>';

    loadProgress();
    loadQuizAnswers();
    loadResources();
    loadEnhancements();
    initTabs();

    // Sync any localStorage data to server
    syncToServer();

    if (!STATE.currentTopicId) {
        renderWelcome();
        document.getElementById('welcome-screen').style.display = 'block';
        document.getElementById('lesson-viewer').style.display = 'none';
        document.getElementById('current-topic-title').textContent = 'Select a topic to begin';
        document.getElementById('topic-meta-badges').innerHTML = '';
    }
}

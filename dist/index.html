const CURRICULUM = [
  {
    "id": 1,
    "phase": "Programming Fundamentals",
    "phaseColor": "java",
    "phaseClass": "ph-java",
    "title": "How Computers & Programming Work",
    "hours": 3,
    "complexity": "beginner",
    "importance": "critical",
    "textbook": "Brookshear & Brylow, Computer Science: An Overview, Ch. 1-2",
    "summary": "CPU, memory, binary, compilers vs interpreters, and the programming mindset.",
    "lesson": "\n<h4>Introduction: What Actually Happens When You Press the Power Button?</h4>\n<p>Every computer you will ever use — from the smartphone in your pocket to the million-server data centers powering the internet — follows the same fundamental architectural blueprint proposed by mathematician John von Neumann in 1945. Understanding this blueprint is not academic trivia. It is the conceptual foundation that explains <em>why</em> code behaves the way it does, <em>why</em> certain operations are fast while others are painfully slow, and <em>how</em> the high-level Java code you write ultimately connects to the physical hardware executing billions of instructions per second.</p>\n\n<p>Before von Neumann, computers were \"hard-wired\" — changing the program meant physically rewiring circuits, a process that took days or weeks. The ENIAC (1945), one of the first general-purpose electronic computers, was programmed by plugging cables into switchboards, like a telephone operator. Von Neumann's revolutionary insight was that program instructions could be stored in the <em>same memory</em> as data, making the computer truly general-purpose. This \"stored-program concept\" is why you can download and run any program on your machine — the CPU doesn't distinguish between \"code\" and \"data\"; context determines how each byte in memory is interpreted.</p>\n\n<h4>The Von Neumann Architecture: Four Components Working in Concert</h4>\n<p>Every computer following the von Neumann model has four interconnected subsystems. Understanding each one — and the bottlenecks between them — is essential knowledge for any programmer who cares about performance.</p>\n\n<p><strong>1. The CPU (Central Processing Unit) — The Brain</strong></p>\n<p>The CPU is where computation actually happens. Modern CPUs contain billions of transistors switching between conducting (1) and non-conducting (0) states billions of times per second. A 4 GHz processor executes roughly 4 billion cycles per second. The CPU has several critical internal components:</p>\n<ul>\n  <li><strong>Registers:</strong> The fastest possible storage — literally inside the CPU. A modern x86-64 processor has 16 general-purpose 64-bit registers plus dozens of specialized registers. Access time: ~0.3 nanoseconds (essentially instant from the programmer's perspective).</li>\n  <li><strong>ALU (Arithmetic Logic Unit):</strong> Performs integer arithmetic and logical operations (AND, OR, XOR, NOT). Floating-point operations go through a separate FPU.</li>\n  <li><strong>Control Unit:</strong> Fetches instructions from memory, decodes them into micro-operations, and dispatches them to the appropriate execution units. This is where the famous \"fetch-decode-execute cycle\" lives.</li>\n  <li><strong>Cache (L1/L2/L3):</strong> Tiny amounts of ultra-fast memory inside or very near the CPU. L1 cache is typically 32KB per core with ~1ns access time. L2 is ~256KB with ~4ns access. L3 is shared across cores, ~8-32MB with ~12ns access. Compare to main RAM at ~100ns — cache is 100x faster.</li>\n</ul>\n\n<p><strong>2. Memory (RAM) — The Workspace</strong></p>\n<p>RAM is a linear array of numbered slots (addresses), each holding one byte (8 bits). When you declare <code>int x = 5;</code> in Java, four consecutive bytes in RAM store the two's-complement representation of the number 5. Key properties:</p>\n<ul>\n  <li><strong>Random Access:</strong> Any byte can be accessed in constant time by its address. Address 0 and address 1,000,000,000 take the same time to read — roughly 100 nanoseconds.</li>\n  <li><strong>Volatile:</strong> RAM requires constant electrical refresh (thousands of times per second). Cut the power, and everything vanishes. This is why unsaved work is lost on a crash.</li>\n  <li><strong>Limited Capacity:</strong> Consumer machines typically have 8-64 GB of RAM. When your program needs more, the OS starts swapping to disk — which is ~100,000x slower. This is why \"out of memory\" errors are so devastating to performance.</li>\n</ul>\n\n<p><strong>3. I/O Devices — The Outside World</strong></p>\n<p>Keyboards, mice, displays, disks, network cards. These are how the computer communicates beyond itself. Disks (SSDs and HDDs) provide <em>persistent</em> storage that survives power loss. An SSD can read at ~3-5 GB/s with ~0.1ms latency. An HDD reads at ~150 MB/s with ~5-10ms latency (the head physically moves). RAM is ~20 GB/s with ~100ns latency. This multi-order-of-magnitude gap is why efficient programs minimize disk I/O.</p>\n\n<p><strong>4. The Bus — The Communication Highway (and Bottleneck)</strong></p>\n<p>The bus connects CPU, RAM, and I/O. It has finite bandwidth — typically 50-100 GB/s for modern systems. When the CPU needs data not in cache, it must fetch from RAM across the bus. This is the \"von Neumann bottleneck\" — the CPU can process data faster than the bus can deliver it. Cache exists specifically to mitigate this bottleneck by keeping frequently-used data close to the CPU.</p>\n\n<div class='key-point'><strong>Critical Insight:</strong> The stored-program concept — instructions and data coexisting in the same addressable memory — is what makes general-purpose computing possible. The CPU doesn't inherently know whether a byte represents an instruction, a number, or part of a string. The <em>instruction pointer</em> (a special CPU register) determines context: bytes at the address it points to are interpreted as instructions; bytes at addresses referenced by those instructions are interpreted as data. This elegant simplicity is the foundation of all modern computing.</div>\n\n<h4>Binary: From Transistors to Numbers, Text, and Programs</h4>\n<p>At the physical level, a transistor is a switch — it conducts (ON) or doesn't (OFF). We label these states 1 and 0. From billions of these binary states, we build everything a computer does.</p>\n\n<p><strong>Representing Numbers — Place Value in Base 2:</strong> Binary uses the same place-value system as decimal, but with base 2 instead of base 10. 1011₂ = 1×8 + 0×4 + 1×2 + 1×1 = 11₁₀. With N bits, you can represent 2ᴺ distinct values. 8 bits (one byte) = 256 values (0-255). 32 bits = ~4.3 billion values. 64 bits = ~18 quintillion values.</p>\n\n<p>Java's integer types are <strong>signed two's complement</strong>. The leftmost bit indicates sign (0 = positive, 1 = negative). For a byte (-128 to 127): 01111111 = 127, 10000000 = -128. This representation has the elegant property that addition works identically for signed and unsigned numbers at the hardware level — the same ALU circuit handles both.</p>\n\n<p><strong>Representing Text — From ASCII to Unicode:</strong> ASCII (1963) maps 128 characters to numbers: 'A' = 65, 'a' = 97, '0' = 48, space = 32, newline = 10. But 128 characters can't handle Chinese, Arabic, or even accented Latin characters. Unicode solves this: each character gets a unique \"code point\" (a number). UTF-8 (the dominant encoding) uses 1-4 bytes per character, with ASCII as a subset (the first 128 code points are identical). Java's <code>char</code> type is 16-bit UTF-16 — adequate for most characters, but emoji and rare scripts require surrogate pairs (two chars).</p>\n\n<p><strong>Representing Images and Sound:</strong> A digital image is a grid of pixels, each represented by RGB values (3 bytes: red, green, blue intensity from 0-255). A 1920×1080 image = ~2 million pixels × 3 bytes = ~6 MB uncompressed. Sound is sampled amplitude values — CD quality is 44,100 samples/second × 16 bits × 2 channels = ~176 KB/s. Video is 24-60 images per second plus synchronized audio. These enormous data rates explain why compression (JPEG, MP3, H.264) is essential.</p>\n\n<h4>Compiled vs Interpreted: The Execution Spectrum</h4>\n<p>Programming languages sit on a spectrum of how they translate human-readable source code into machine-executable instructions. Understanding where Java fits on this spectrum is key to understanding its design tradeoffs.</p>\n\n<p><strong>Compiled Languages (C, C++, Rust, Go):</strong> A compiler translates the entire source program to machine code <em>before</em> execution. The output is a standalone executable — a binary file containing native CPU instructions. Advantages: maximum runtime performance, early error detection (type errors, undefined variables caught at compile time), no runtime overhead. Disadvantages: the executable only works on the target CPU architecture and OS (a binary compiled for x86-64 Linux won't run on ARM macOS), longer development cycle (edit-compile-link-run).</p>\n\n<p><strong>Interpreted Languages (Python, JavaScript, Ruby, Bash):</strong> An interpreter reads source code line-by-line (or statement-by-statement) and executes it directly, without producing a separate executable. Advantages: platform independence (the interpreter abstracts the hardware), faster development cycle (edit-run, no compile step), dynamic typing enables rapid prototyping. Disadvantages: slower execution (10-100x slower than compiled code for compute-heavy tasks), errors discovered at runtime that a compiler would have caught, the interpreter must be present on the target system.</p>\n\n<p><strong>Java's Hybrid Approach — The Best of Both Worlds:</strong> Java was designed from the start to combine the performance of compilation with the platform independence of interpretation. This is achieved through a two-stage process:</p>\n\n<ol>\n  <li><strong>Compilation (javac):</strong> The Java compiler translates <code>.java</code> source files into <code>.class</code> files containing <strong>bytecode</strong> — a platform-neutral intermediate representation. Bytecode is a sequence of 1-byte opcodes (hence the name) for a virtual machine, not a physical CPU. For example, the Java statement <code>int sum = a + b;</code> compiles to bytecode like: <code>iload_1</code> (push a), <code>iload_2</code> (push b), <code>iadd</code> (add), <code>istore_3</code> (store in sum). You can see bytecode with <code>javap -c ClassName</code>.</li>\n  <li><strong>Execution (java):</strong> The Java Virtual Machine (JVM) loads the <code>.class</code> file, verifies the bytecode for safety (no stack overflow attacks, no illegal memory access, no type confusion), and begins executing. The JVM uses a combination of <strong>interpretation</strong> (fast startup) and <strong>Just-In-Time (JIT) compilation</strong> (fast long-term performance). The JVM monitors which methods are called most frequently (\"hot spots\") and compiles them to native machine code, applying aggressive optimizations (inlining, loop unrolling, escape analysis, dead code elimination) based on actual runtime behavior — optimizations impossible for ahead-of-time compilers.</li>\n</ol>\n\n<div class='key-point'><strong>\"Write Once, Run Anywhere\":</strong> Because bytecode targets the JVM — a virtual machine, not a physical CPU — the same <code>.class</code> file runs on any platform with a JVM. This was Java's revolutionary promise in 1995. The JVM handles all platform differences: threading maps to native OS threads, graphics map to the native windowing system, file I/O uses the native filesystem APIs. The programmer writes one codebase; the JVM handles the rest.</div>\n\n<h4>The Fetch-Decode-Execute Cycle: A CPU's Heartbeat</h4>\n<p>Every instruction your Java program executes ultimately goes through this cycle, billions of times per second:</p>\n<ol>\n  <li><strong>Fetch:</strong> The control unit reads the instruction at the memory address stored in the Instruction Pointer (IP) register. The instruction is loaded into the Instruction Register (IR). The IP increments to point to the next instruction.</li>\n  <li><strong>Decode:</strong> The control unit interprets the bit pattern in the IR. Which operation? Which registers or memory addresses are the operands? Modern x86-64 instructions can be 1-15 bytes long and encode complex operations — the decoder breaks them into simpler micro-operations.</li>\n  <li><strong>Execute:</strong> The appropriate execution unit (ALU, FPU, load/store unit) performs the operation. An addition: ALU combines two register values. A load: the memory controller reads from RAM (or cache). A branch: the IP may jump to a new address.</li>\n  <li><strong>Repeat:</strong> The IP now points to the next instruction, and the cycle continues.</li>\n</ol>\n<p>Modern CPUs are vastly more complex than this simple model — they execute multiple instructions simultaneously (superscalar), execute instructions <em>out of order</em> when dependencies allow, <em>speculatively</em> execute branches before knowing whether the branch is taken, and use sophisticated <em>branch predictors</em> (~95%+ accurate) to guess which way a conditional will go. But the fetch-decode-execute model remains the correct mental abstraction.</p>\n\n<h4>From Source Code to Execution: The Complete Journey</h4>\n<p>Let's trace the entire path of a simple Java program from your fingertips to photons on your screen:</p>\n<ol>\n  <li><strong>You type</strong> <code>HelloWorld.java</code> in IntelliJ IDEA. The IDE continuously compiles in the background, flagging errors before you even save.</li>\n  <li><strong>javac compiles:</strong> Lexical analysis (tokenization) → Syntax analysis (parsing into an AST) → Semantic analysis (type checking, name resolution) → Bytecode generation. Output: <code>HelloWorld.class</code>.</li>\n  <li><strong>You run</strong> <code>java HelloWorld</code>. The OS creates a new process, allocates memory, and starts the JVM.</li>\n  <li><strong>JVM initialization:</strong> The Bootstrap ClassLoader loads core Java classes (java.lang.*). The Platform ClassLoader loads Java SE modules. The Application ClassLoader loads your HelloWorld class.</li>\n  <li><strong>Bytecode verification:</strong> The JVM checks that the bytecode is well-formed, doesn't perform illegal casts, doesn't overflow the stack, and doesn't access private members. This is a critical security sandbox.</li>\n  <li><strong>Main method execution:</strong> The JVM finds <code>public static void main(String[])</code> and begins executing. The first calls are interpreted (fast startup). As <code>main()</code> calls other methods, the JIT compiler identifies hot methods and compiles them to native code.</li>\n  <li><strong>System.out.println reaches the terminal:</strong> This chains through OutputStream buffers, native OS write() system calls, the terminal emulator's rendering engine, and finally the GPU rasterizes the characters to pixels on your display.</li>\n</ol>\n\n<h4>The Programming Mindset: Learning to Think Like a Machine</h4>\n<p>Programming is fundamentally different from every other intellectual skill. You are instructing a machine that has <strong>no intuition, no common sense, no ability to \"figure out what you meant,\"</strong> and no tolerance for ambiguity. The machine will execute your instructions with perfect, literal fidelity — which means every bug is the computer faithfully executing your flawed instructions.</p>\n\n<p>The key mental shifts that experienced programmers internalize:</p>\n<ul>\n  <li><strong>Deterministic thinking:</strong> Given the same inputs and the same program state, the computer always produces the same output. Non-determinism (random numbers, thread scheduling, network timing) is explicitly programmed. If a program behaves unpredictably, it's because you introduced unpredictability.</li>\n  <li><strong>Abstraction layering:</strong> No one understands the entire stack from transistors to web frameworks. The skill is knowing which layer of abstraction to think at for a given problem, and knowing when to drop down a layer to debug. This is why understanding the layers <em>beneath</em> Java — the JVM, the OS, the hardware — makes you a dramatically better Java programmer.</li>\n  <li><strong>Decomposition:</strong> Every non-trivial problem is solved by breaking it into smaller, tractable sub-problems. This recursive decomposition continues until each piece is trivially solvable. The art is choosing the right decomposition — the right abstractions, the right interfaces between components.</li>\n  <li><strong>Debugging mindset:</strong> When the program doesn't work, the question is never \"why is the computer doing this to me?\" but rather \"what did I tell the computer to do, and how does that differ from what I wanted?\" The bug is always in your mental model, not in the machine's execution.</li>\n</ul>\n\n<h4>Textbook Reference</h4>\n<p>Brookshear & Brylow, <em>Computer Science: An Overview</em> (13th ed), Chapters 1-2. This classic text provides an accessible survey of the entire field of computer science, from hardware architecture through operating systems, algorithms, and programming languages. Chapters 1 and 2 cover data storage (bits, binary, memory) and data manipulation (CPU architecture, machine language, program execution) at a depth suitable for beginning programmers.</p>\n",

    "lesson": "\n<h4>Introduction: Your Tools Shape Your Thinking</h4>\n<p>Before writing a single meaningful line of Java, you need to set up your development environment correctly. This is not busywork — it's an investment that prevents hours of mysterious \"it works on my machine\" problems later. The Java toolchain is the same whether you're writing a 100-line homework assignment or a million-line distributed system at a Fortune 500 company. Understanding each tool deeply at the start pays compounding dividends throughout your entire career.</p>\n\n<p>There's a deeper reason to take tooling seriously: your tools shape how you think about problems. A developer who only knows <code>javac</code> and a text editor thinks in terms of files and compilation. A developer who knows Maven thinks in terms of modules and dependencies. A developer who knows IntelliJ's refactoring tools thinks in terms of code structure and design patterns. Each tool adds a new dimension to your problem-solving toolkit.</p>\n\n<h4>Step 1: Installing the JDK — More Than Just java and javac</h4>\n<p>The <strong>JDK (Java Development Kit)</strong> is the complete toolkit for Java development. It's often confused with the JRE (Java Runtime Environment), which only runs Java programs but cannot compile them. As a developer, you always install the JDK. Key components inside a JDK installation:</p>\n\n<table class='meta-table'>\n  <tr><th>Tool</th><th>Purpose</th></tr>\n  <tr><td><code>javac</code></td><td>The Java compiler — translates .java to .class bytecode</td></tr>\n  <tr><td><code>java</code></td><td>The JVM launcher — loads and executes .class files</td></tr>\n  <tr><td><code>jar</code></td><td>Packages .class files and resources into .jar archives (ZIP format)</td></tr>\n  <tr><td><code>javadoc</code></td><td>Generates HTML API documentation from /** ... */ comments</td></tr>\n  <tr><td><code>jlink</code></td><td>Creates custom runtime images with only the modules you need</td></tr>\n  <tr><td><code>jshell</code></td><td>Interactive REPL for experimenting with Java code (since Java 9)</td></tr>\n  <tr><td><code>jpackage</code></td><td>Packages Java apps into native installers (.exe, .dmg, .deb)</td></tr>\n  <tr><td><code>javap</code></td><td>Disassembles .class files to show bytecode — invaluable for understanding compilation</td></tr>\n</table>\n\n<p><strong>Why JDK 21?</strong> Java releases a new version every six months, but most are short-term releases. Long-Term Support (LTS) releases — 8, 11, 17, 21, and the upcoming 25 — receive years of free security updates from Oracle and other vendors (Amazon Corretto, Eclipse Temurin, Azul Zulu). JDK 21 is the current LTS as of 2024-2025. It includes Virtual Threads (Project Loom), Record Patterns, Pattern Matching for Switch, and String Templates (preview) — features that fundamentally change how you write concurrent and data-oriented Java code.</p>\n\n<p><strong>Installation verification:</strong> After installing, always verify with <code>java -version</code> and <code>javac -version</code>. Both should report the same version number. A mismatch (e.g., javac 21 but java 17) means your PATH has multiple Java installations and the wrong one takes precedence — a common source of \"compiles fine but won't run\" errors.</p>\n\n<h4>Step 2: JAVA_HOME and PATH — The Environment Variables Every Java Developer Must Understand</h4>\n<p><strong>JAVA_HOME</strong> points to the root directory of your JDK installation (e.g., <code>/Library/Java/JavaVirtualMachines/jdk-21.jdk/Contents/Home</code> on macOS). Build tools (Maven, Gradle), application servers (Tomcat, Jetty), IDEs, and CI/CD pipelines all use JAVA_HOME to locate the JDK. When you see \"JAVA_HOME is not set\" or \"Cannot find JDK\", it means a tool looked for this variable and found it missing or pointing to a JRE instead of a JDK.</p>\n\n<p><strong>PATH</strong> tells your operating system where to find executable programs. Adding <code>$JAVA_HOME/bin</code> to your PATH lets you type <code>java</code> and <code>javac</code> from any terminal directory. Without it, you'd need to type the full path (<code>/Library/Java/.../bin/java</code>) every time. Pro tip: use the <code>/usr/libexec/java_home -v 21</code> command on macOS to dynamically locate the correct JDK, rather than hardcoding a version-specific path that breaks on every update.</p>\n\n<h4>Step 3: IntelliJ IDEA — More Than a Text Editor</h4>\n<p>You can write Java in any text editor (Notepad, Vim, VS Code), but a professional IDE provides capabilities that fundamentally change how you interact with code. IntelliJ IDEA (Community Edition is free and fully sufficient for learning) is the industry standard. Here's what you're paying for in RAM and CPU — and why it's worth it:</p>\n\n<ul>\n  <li><strong>Intelligent Code Completion:</strong> Not just autocomplete — IntelliJ understands your code's type hierarchy, resolves generics, predicts the most likely method call based on context, and completes entire statement chains. It indexes your entire project (and its dependencies) to build a semantic model that enables completion based on <em>meaning</em>, not just text matching.</li>\n  <li><strong>Refactoring That Works:</strong> Rename a variable, and IntelliJ updates every reference across your entire project — correctly, even with overloaded methods, generics, and lambda expressions. Extract a block of code into a method, and IntelliJ figures out the parameter list and return type. Change a method signature, and all callers update. These are not simple search-and-replace operations — they're AST-aware transformations that understand Java semantics.</li>\n  <li><strong>Static Analysis as You Type:</strong> IntelliJ continuously scans your code and underlines issues before you compile. Unused variables, potential null pointer dereferences, code that can be simplified, performance anti-patterns — thousands of inspections run in real-time, effectively giving you a senior code reviewer watching over your shoulder.</li>\n  <li><strong>Built-in Debugger:</strong> Set breakpoints by clicking in the margin. Run in debug mode. When execution hits a breakpoint, you can inspect every variable's value, evaluate arbitrary expressions, step line-by-line, step into methods, and even change variable values at runtime. Print-statement debugging becomes obsolete once you learn to use a real debugger.</li>\n  <li><strong>Version Control Integration:</strong> Diff viewer, merge conflict resolver, commit history browser, branch manager, pull request integration — all inside the IDE. See who last modified each line (Git blame) with one click.</li>\n</ul>\n\n<h4>Step 4: Git — Version Control Is Not Optional</h4>\n<p>Git is the universally-adopted version control system. It tracks every change to your code, enables collaboration, and serves as a time machine — you can revert to any previous version, compare changes across time, and experiment in branches without risking your stable code. Even when working alone, Git is essential: it answers \"what did I change and when?\", provides backup through remote repositories (GitHub, GitLab), and builds the habit of incremental, documented progress.</p>\n\n<p>Key concepts to understand from day one: <strong>repository</strong> (the .git folder with complete history), <strong>commit</strong> (a snapshot of all files at a point in time with a message explaining why), <strong>branch</strong> (an independent line of development), <strong>remote</strong> (a copy of the repository on another machine, typically a server), and <strong>working directory</strong> (your current files — the only part you directly edit).</p>\n\n<h4>The Build-Compile-Run-Debug Cycle</h4>\n<p>Professional Java development follows an iterative loop:</p>\n<ol>\n  <li><strong>Write:</strong> Create or modify <code>.java</code> source files. Modern IDEs compile continuously in the background, flagging syntax and type errors as you type.</li>\n  <li><strong>Compile:</strong> <code>javac</code> (invoked directly or through your IDE/build tool) translates <code>.java</code> to <code>.class</code> bytecode. Compilation errors mean the compiler couldn't understand your code — syntax errors, type mismatches, missing imports, undefined variables. These are caught before the program runs.</li>\n  <li><strong>Run:</strong> The JVM loads the compiled bytecode and executes it. Runtime errors (exceptions like NullPointerException, ArrayIndexOutOfBoundsException) occur at this stage — logic errors that the compiler couldn't detect because they depend on actual data values.</li>\n  <li><strong>Debug:</strong> When behavior doesn't match expectation, you use the debugger (not print statements!) to inspect program state at specific points. Set breakpoints, examine variables, step through execution, and understand <em>why</em> the program behaves as it does.</li>\n  <li><strong>Test:</strong> Write automated tests (JUnit) that verify behavior. Tests catch regressions — when a change to one part of the code breaks another part. A comprehensive test suite gives you confidence to refactor aggressively.</li>\n</ol>\n\n<h4>Maven and Gradle: Build Tools That Manage Complexity</h4>\n<p>For a single-file program, <code>javac HelloWorld.java && java HelloWorld</code> suffices. For a real project with dozens of dependencies (libraries your code uses), multiple source directories, resource files, test code, and deployment packaging, you need a build tool. Maven and Gradle are the two dominant choices:</p>\n\n<p><strong>Maven</strong> uses XML configuration (<code>pom.xml</code>) and follows a strict \"convention over configuration\" philosophy. If you put your source code in <code>src/main/java/</code> and your tests in <code>src/test/java/</code>, Maven knows what to do without further configuration. This standardization means any Java developer can navigate any Maven project — the structure is always the same. Maven's dependency management (declaring which libraries your project needs, and Maven downloads them and their transitive dependencies automatically) transformed Java development when introduced in 2004.</p>\n\n<p><strong>Gradle</strong> uses Groovy or Kotlin DSL for configuration (<code>build.gradle</code>) and is more flexible and performant than Maven (incremental builds, build caching, parallel execution). Gradle is the standard for Android development and is increasingly common for server-side projects. For beginners, Maven's strict conventions are actually an advantage — they prevent configuration mistakes and teach the standard project layout.</p>\n\n<div class='key-point'><strong>Toolchain Summary:</strong> You write Java source code. javac compiles it to bytecode. The JVM executes it (with JIT compilation for performance). Maven or Gradle manages dependencies and builds. Git tracks every change. IntelliJ IDEA integrates all of these into a productive, coherent workflow. This exact toolchain scales from a single-file experiment to a distributed system with thousands of classes and hundreds of dependencies. Learn each tool deeply — they are the instruments of your craft.</div>\n\n<h4>Common Setup Problems (and Their Solutions)</h4>\n<p><strong>\"java\" works but \"javac\" doesn't:</strong> You installed a JRE, not a JDK. The JRE contains <code>java</code> (the runtime) but not <code>javac</code> (the compiler). Uninstall the JRE and install the JDK.</p>\n<p><strong>\"Unsupported class version\" error:</strong> You compiled with a newer JDK than the one you're running with. <code>.class</code> files have a version number; older JVMs reject newer bytecode. Solution: either run with the same or newer JDK, or use the <code>-source</code> and <code>-target</code> flags to compile for an older version.</p>\n<p><strong>IntelliJ can't find the JDK:</strong> Go to File → Project Structure → SDK and point to your JDK installation directory. On macOS, this is typically <code>/Library/Java/JavaVirtualMachines/jdk-21.jdk/Contents/Home</code>.</p>\n<p><strong>Port already in use:</strong> When running a web server, port 8080 (or 3000, etc.) may be occupied by another process. Use <code>lsof -i :8080</code> to find the process, or configure your application to use a different port.</p>\n",

    "summary": "Class declaration, main method signature, System.out.println, and understanding every keyword in HelloWorld.",
    "lesson": "\n<h4>Introduction: Every Character Has a Reason</h4>\n<p>A Java program is not magic — every keyword, every punctuation mark, every naming convention exists for a specific, articulable reason. This lesson dissects the simplest possible Java program character by character, keyword by keyword, so that you understand not merely <em>what</em> to type but <em>why</em> each piece exists and what would break if it were different. This deep understanding of fundamentals is what separates software engineers who can debug novel problems from programmers who can only copy-paste known solutions.</p>\n\n<h4>The Complete HelloWorld — Every Token Explained</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='kw'>public class</span> <span class='tp'>HelloWorld</span> {\n    <span class='kw'>public static void</span> <span class='mt'>main</span>(<span class='tp'>String</span>[] args) {\n        <span class='tp'>System</span>.out.println(<span class='st'>\"Hello, World!\"</span>);\n    }\n}</pre></div>\n\n<p>Let's examine each token in the order the compiler encounters them.</p>\n\n<p><strong><code>public</code> (first occurrence — class modifier):</strong> An access modifier meaning \"visible to all other classes, regardless of package.\" The top-level class must be public so the JVM can find and load it from outside the package. If the class were package-private (no modifier), the JVM — running from its own internal package — couldn't access it, and you'd get \"Could not find or load main class.\" Note: a <code>.java</code> file can have at most one public top-level class, and its name must match the filename exactly (case-sensitive on all platforms).</p>\n\n<p><strong><code>class</code>:</strong> The fundamental unit of organization in Java. <em>Everything</em> in Java — every variable, every method, every constant — lives inside a class. Java is not purely object-oriented (primitives like int exist outside the class/object model), but it is <em>class-based</em>. A class is a blueprint that defines the state (fields) and behavior (methods) of objects. Even utility classes with only static methods (like Math) must be wrapped in a class declaration.</p>\n\n<p><strong><code>HelloWorld</code>:</strong> The class name. Java convention uses PascalCase: each word capitalized, no underscores. The name should describe what the class represents. The filename <code>HelloWorld.java</code> must match the public class name exactly — this is enforced by the compiler (javac reports an error if the names don't match). On case-insensitive filesystems (Windows), <code>helloworld.java</code> compiles but causes confusion when shared with macOS/Linux developers. <strong>Always match case exactly.</strong></p>\n\n<p><strong><code>{</code> and <code>}</code> (outer pair — class body):</strong> Curly braces define a <strong>block</strong> — a scope boundary. Variables declared inside a block exist only within that block and are destroyed when execution leaves it. The outer braces define the class body: everything between them is part of the HelloWorld class definition. In Java, braces are mandatory for class and method bodies (unlike Python where indentation defines blocks). Proper brace placement is a religious war in programming; the Java community standard (Oracle, Google) is \"Egyptian brackets\" — opening brace on the same line as the declaration, closing brace on its own line aligned with the declaration.</p>\n\n<p><strong><code>public</code> (second occurrence — method modifier):</strong> The main method must be public because the JVM calls it from outside the class. If main were private, the JVM would see the method but refuse to call it, producing \"Main method not public.\" If main were protected or package-private, the JVM (which is not a subclass and not in your package) couldn't access it.</p>\n\n<p><strong><code>static</code>:</strong> This is the keyword that students most frequently forget — and the one whose purpose is most important to understand. static means \"belongs to the class itself, not to any specific instance.\" The JVM calls <code>main()</code> before any objects exist — there are no HelloWorld instances yet. If main were not static, the JVM would need to create a HelloWorld object first (via <code>new HelloWorld()</code>), but to create an object, code must already be running — a chicken-and-egg problem. static solves this: it makes the method callable on the class directly (<code>HelloWorld.main(args)</code>) without any instantiation.</p>\n\n<p>The distinction between static and instance context is fundamental in Java. A static method can only access other static members directly. To access instance fields or methods, it needs an object reference. This is why <code>public static void main</code> often creates an instance of its own class: <code>new HelloWorld().doSomething()</code>.</p>\n\n<p><strong><code>void</code>:</strong> The return type. void means \"this method returns no value.\" The main method communicates success or failure to the operating system through the <strong>process exit code</strong>, not through a return value. Exit code 0 means success; any non-zero value (typically 1) means failure. You can set the exit code explicitly with <code>System.exit(0)</code>, or it defaults to 0 when main() returns normally. The exit code is how shell scripts and CI/CD pipelines determine whether your program succeeded.</p>\n\n<p><strong><code>main</code>:</strong> The designated entry point. When you execute <code>java HelloWorld</code>, the JVM specifically searches for a method with the <em>exact</em> signature <code>public static void main(String[])</code>. Any deviation — different capitalization (Main), missing static, different parameter type (<code>String...</code> instead of <code>String[]</code> — which is actually legal, as varargs are sugar for arrays), wrong return type — and the JVM reports the frustratingly vague \"Error: Could not find or load main class\" or \"Main method not found.\" The name \"main\" is a convention inherited from C.</p>\n\n<p><strong><code>String[] args</code>:</strong> An array of String objects containing the command-line arguments. When you run <code>java HelloWorld foo bar baz</code>, the args array contains <code>[\"foo\", \"bar\", \"baz\"]</code>. <code>args.length</code> tells you how many arguments were provided. Command-line arguments are how configuration, file paths, and runtime options are passed to Java programs — from simple scripts to enterprise servers. Even when your program takes no arguments, the parameter must be declared; the JVM passes an empty array (length 0), not null.</p>\n\n<p><strong><code>System.out.println(\"Hello, World!\");</code>:</strong> This single line is a chain of three components separated by dots — each dot represents a member access. Let's trace from left to right:</p>\n<ul>\n  <li><strong><code>System</code>:</strong> A class in the <code>java.lang</code> package. It provides access to system-level facilities: standard input (System.in), standard output (System.out), standard error (System.err), environment variables, system properties, and the garbage collector. System cannot be instantiated — its constructor is private, and all its members are static.</li>\n  <li><strong><code>out</code>:</strong> A public static final field of type <code>java.io.PrintStream</code>. It represents the \"standard output\" stream — by default, the terminal/console. Because it's static, you access it as System.out (not <code>new System().out</code> — which wouldn't compile anyway since System's constructor is private).</li>\n  <li><strong><code>println(String)</code>:</strong> A method on PrintStream that prints its argument followed by a platform-specific line separator (\\n on Unix/macOS, \\r\\n on Windows). The alternative <code>print()</code> prints without a trailing newline. println is overloaded for all primitive types and Object (calling String.valueOf() on the argument).</li>\n</ul>\n<p>The semicolon (<code>;</code>) terminates the statement. In Java, semicolons are required (unlike JavaScript where they're optional, or Python where they're not used). Forgetting a semicolon is the most common syntax error for beginners — the compiler's error message usually points to the <em>next</em> line, which is confusing until you learn that the compiler doesn't realize there's a missing semicolon until it encounters something unexpected on the following line.</p>\n\n<h4>Why java.lang Is Automatically Imported</h4>\n<p>Every Java source file implicitly begins with <code>import java.lang.*;</code> — you never need to write this line. The java.lang package contains the most fundamental classes in the Java platform:</p>\n<ul>\n  <li><strong>String:</strong> Immutable character sequences. The most-used class in Java.</li>\n  <li><strong>System:</strong> System-level I/O and properties (as discussed above).</li>\n  <li><strong>Object:</strong> The root of the entire Java class hierarchy. Every class ultimately extends Object.</li>\n  <li><strong>Math:</strong> Mathematical functions (sin, cos, sqrt, pow, random, etc.) and constants (PI, E).</li>\n  <li><strong>Integer, Double, Boolean, etc.:</strong> Wrapper classes for primitives (needed for generics).</li>\n  <li><strong>Thread, Runnable:</strong> Concurrency primitives.</li>\n  <li><strong>Exception, Error, Throwable:</strong> The exception hierarchy.</li>\n  <li><strong>StringBuilder, StringBuffer:</strong> Mutable string builders.</li>\n</ul>\n<p>Without auto-import, every Java file would begin with 15+ import statements. Classes outside java.lang — like ArrayList (java.util), File (java.io), or Scanner (java.util) — must be explicitly imported or fully qualified.</p>\n\n<h4>The Compilation and Execution Pipeline in Full Detail</h4>\n<p>Understanding what happens between typing <code>java HelloWorld</code> and seeing output on your screen is essential for debugging classpath issues, version mismatches, and startup performance problems. Here is the complete sequence:</p>\n\n<ol>\n  <li><strong>OS process creation:</strong> The operating system creates a new process, allocates virtual memory space, and loads the <code>java</code> launcher binary. The launcher parses command-line arguments and JVM options (things starting with -X, -D, --add-opens, etc.).</li>\n  <li><strong>JVM initialization:</strong> The JVM allocates the heap (default: 1/4 of physical RAM, min 256MB), creates the main thread, initializes the garbage collector, and starts the ClassLoader hierarchy.</li>\n  <li><strong>Bootstrap ClassLoader:</strong> Loads the core Java runtime classes from <code>&lt;JDK&gt;/lib/modules</code> (the module path in Java 9+). These include java.lang.*, java.util.*, java.io.* — the classes that Java itself is built from. The Bootstrap ClassLoader is implemented in native code (C++), not Java, because it loads the classes needed to run Java itself.</li>\n  <li><strong>Platform ClassLoader:</strong> Loads Java SE platform modules not in the bootstrap set (JAXB, JAF, etc.).</li>\n  <li><strong>Application ClassLoader:</strong> Loads your application classes from the classpath (the current directory by default, or directories/JARs specified with -cp or -classpath). This is the ClassLoader you interact with when you get ClassNotFoundException.</li>\n  <li><strong>HelloWorld class loading:</strong> The Application ClassLoader finds HelloWorld.class in the current directory, reads the bytecode, and constructs a Class object representing the HelloWorld class in the JVM's method area (a region of the heap storing class metadata).</li>\n  <li><strong>Bytecode verification:</strong> The JVM's verifier checks that the bytecode is well-formed: no illegal opcodes, no stack overflow, correct types at all instruction boundaries, no access to private members from outside the class. This is a critical security measure — without it, a maliciously crafted .class file could crash the JVM or access memory it shouldn't.</li>\n  <li><strong>Static initialization:</strong> The JVM executes any static initializer blocks and static field initializers in the HelloWorld class. These run once, the first time the class is loaded.</li>\n  <li><strong>Main method invocation:</strong> The JVM locates <code>public static void main(String[])</code> in the loaded Class, packages the command-line arguments into a String[], and invokes the method through the JNI (Java Native Interface) — the bridge between the native C++ JVM code and the Java method.</li>\n  <li><strong>Execution:</strong> The JVM executes the bytecode of main(). Initially, the interpreter executes bytecode instructions one by one (fast startup). After a method has been called enough times (the \"compile threshold,\" typically 1,500-10,000 invocations depending on JVM configuration), the JIT compiler compiles it to native machine code. Subsequent calls execute the optimized native code directly.</li>\n  <li><strong>System.out.println reaches the terminal:</strong> The PrintStream buffers the output characters. When the buffer is full or <code>println()</code> is called (which flushes automatically), the bytes travel through the OS's I/O subsystem, to the terminal emulator, which renders them as pixels on your display. The entire chain — Java method call to visible output — involves dozens of abstraction layers, each faithfully passing data to the next.</li>\n</ol>\n\n<div class='key-point'><strong>Every keyword in HelloWorld exists for a concrete, articulable reason:</strong> public = JVM accessibility. class = Java's fundamental organizational unit. static = callable without object instantiation (solving the chicken-and-egg problem). void = return type when the value is communicated through exit codes instead. main = the JVM's designated entry point. String[] args = command-line arguments. System.out.println = the chain from Java to OS standard output. None of these are arbitrary — each solves a specific design requirement. Understanding <em>why</em> each keyword is necessary is the difference between memorizing Java syntax and understanding Java's design.</div>\n\n<h4>Common Beginner Errors and What They Actually Mean</h4>\n<p><strong>\"javac: command not found\":</strong> The JDK is not installed or not on your PATH. The OS can't find the javac executable. Fix: install the JDK (not just the JRE) and add its bin/ directory to PATH.</p>\n<p><strong>\"Error: Could not find or load main class HelloWorld\":</strong> The JVM can't find the class file. Possible causes: (a) you forgot to compile (run javac first), (b) you're not in the directory containing HelloWorld.class, (c) the class has a package declaration but you're running from the wrong directory, (d) the class name is misspelled, including case.</p>\n<p><strong>\"Error: Main method not found in class HelloWorld\":</strong> The class exists but the main method signature is wrong. Check: is it public? static? void? named \"main\" exactly? parameter is String[]? Common mistakes: Main (capital M), missing static, parameter is String instead of String[].</p>\n<p><strong>\"Unsupported class version\":</strong> You compiled with a newer JDK than the one used to run. Class files have a major version number; JDK 21 produces version 65, which JDK 17 (version 61) rejects. Always check java -version and javac -version match.</p>\n<p><strong>Semicolons forgotten:</strong> The error message points to the <em>next</em> line after the missing semicolon, because the compiler doesn't realize the statement is incomplete until it encounters something that can't legally follow. When the compiler complains about a perfectly good line, check the line above it for a missing semicolon.</p>\n",

    "id": 4,
    "phase": "Programming Fundamentals",

    "summary": "The 8 primitive types, reference types, stack vs heap, type casting (widening/narrowing), and IEEE 754 floating-point.",
    "lesson": "\n<h4>Introduction: Java's Type System — The Bedrock of Safe Code</h4>\n<p>Java is <strong>statically typed</strong>: every variable has a declared type that is known at compile time and can never change. A variable declared as <code>int</code> can never hold a String. The compiler enforces this, catching type mismatches before the program runs. Java is also <strong>strongly typed</strong>: you cannot casually treat one type as another without an explicit, intentional cast. These two properties together eliminate entire categories of bugs — memory corruption, type confusion, buffer overflows — that plague C and C++ programs.</p>\n\n<p>Java's type system divides cleanly into two universes: <strong>8 primitive types</strong> (the building blocks: byte, short, int, long, float, double, char, boolean) and <strong>reference types</strong> (everything else: classes, interfaces, arrays, enums, records). Primitives hold raw values directly and live on the stack (when local variables) or inline within objects (when fields). Reference types hold memory addresses (pointers) to objects on the heap. Understanding this dichotomy — and when Java transparently converts between them through autoboxing — is foundational to understanding Java memory, performance, and behavior.</p>\n\n<h4>The 8 Primitive Types — Your Data Atoms</h4>\n<p>Primitives are the irreducible units of data in Java. Their sizes are <strong>guaranteed by the language specification</strong> — unlike C where int size varies by platform, Java's int is always exactly 32 bits on every platform. This guarantee is essential for portable programming. No matter where your code runs — a Raspberry Pi, a Windows laptop, a mainframe — an int holds the same range of values.</p>\n\n<h4>Integer Types: From Bytes to Astronomical Numbers</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='tp'>byte</span> b = 127;                  <span class='cm'>// 8 bits signed: -128 to 127</span>\n<span class='tp'>short</span> s = 32_767;             <span class='cm'>// 16 bits signed: -32,768 to 32,767</span>\n<span class='tp'>int</span> i = 2_147_483_647;       <span class='cm'>// 32 bits signed: -2,147,483,648 to 2,147,483,647</span>\n<span class='tp'>long</span> l = 9_223_372_036_854_775_807L; <span class='cm'>// 64 bits, L suffix required</span></pre></div>\n\n<p><strong>Why int is the default integer type:</strong> Integer literals (like 42, -7, 0) are int by default. The CPU's general-purpose registers are 64 bits on modern processors, but 32-bit operations are the \"sweet spot\" — smaller than long (uses half the memory and cache space, faster for some operations) yet large enough for the vast majority of counting, indexing, and arithmetic needs. An int can count to 2.1 billion — enough for most use cases. Only use byte/short when saving memory in large arrays, and only use long when you genuinely need values beyond ±2.1 billion (timestamps in milliseconds, financial calculations in cents, scientific computing).</p>\n\n<p><strong>The underscore separator</strong> (<code>2_147_483_647</code>) is pure readability sugar — the compiler strips underscores before parsing the number. You can place them anywhere between digits. Useful patterns: grouping thousands (1_000_000), grouping bytes in hex (0xFFFF_FFFF), grouping nibbles in binary (0b1101_0010).</p>\n\n<p><strong>Overflow is silent and deadly:</strong> Java's integer arithmetic wraps on overflow — no exception is thrown. Adding 1 to Integer.MAX_VALUE silently produces Integer.MIN_VALUE. This has caused real disasters: the Ariane 5 rocket explosion ($370M, 1996) was caused by a 64-bit float being stuffed into a 16-bit integer, overflowing. For overflow-safe arithmetic, use <code>Math.addExact()</code>, <code>Math.subtractExact()</code>, <code>Math.multiplyExact()</code> (all throw ArithmeticException on overflow).</p>\n\n<h4>Floating-Point Types: IEEE 754 and Its Consequences</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='tp'>float</span> f = 3.14159f;             <span class='cm'>// 32-bit IEEE 754, ~7 significant decimal digits</span>\n<span class='tp'>double</span> d = 3.141592653589793;  <span class='cm'>// 64-bit IEEE 754, ~15 significant decimal digits</span></pre></div>\n\n<p>Floating-point numbers in Java follow <strong>IEEE 754</strong>, the international standard for binary floating-point arithmetic. The critical thing to understand: <strong>floating-point numbers are binary fractions, not decimal fractions.</strong> Just as 1/3 cannot be represented exactly in decimal (0.333...), many simple decimal values — including 0.1, 0.2, and 0.3 — cannot be represented exactly in binary. They become repeating binary fractions, truncated to fit in 32 or 64 bits. This is not a Java bug; it's a mathematical limitation of representing base-10 fractions in base-2 with finite precision.</p>\n\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='tp'>double</span> a = 0.1 + 0.2;\nSystem.out.println(a);            <span class='cm'>// 0.30000000000000004 — NOT 0.3!</span>\nSystem.out.println(a == 0.3);     <span class='cm'>// false — NEVER compare floats with ==</span>\n\n<span class='cm'>// The correct way: check if the difference is tiny</span>\n<span class='kw'>boolean</span> approxEqual = Math.abs(a - 0.3) < 1e-10;  <span class='cm'>// true</span></pre></div>\n\n<p><strong>The golden rule for money:</strong> Never, ever use float or double for financial calculations. Use <code>BigDecimal</code> for exact decimal arithmetic, or store amounts as integers of the smallest unit (cents, satoshis, etc.). The <code>BigDecimal</code> class provides arbitrary-precision decimal arithmetic with explicit rounding control. The performance cost is negligible for typical business calculations.</p>\n\n<p><strong>Special floating-point values:</strong> IEEE 754 defines several special values that Java supports: <code>Double.POSITIVE_INFINITY</code> (result of 1.0/0.0), <code>Double.NEGATIVE_INFINITY</code> (-1.0/0.0), <code>Double.NaN</code> (\"Not a Number\", result of 0.0/0.0 or Math.sqrt(-1)). NaN is unique: <code>NaN != NaN</code> is true (NaN is the only value not equal to itself). Use <code>Double.isNaN(x)</code> to check.</p>\n\n<h4>char — More Than Just Letters</h4>\n<p>Java's <code>char</code> is a 16-bit unsigned type representing a single UTF-16 code unit (0 to 65,535). It's important to understand what \"UTF-16 code unit\" means. Unicode defines over 144,000 characters (and growing). A 16-bit integer can only represent 65,536 values directly. Characters in the \"Basic Multilingual Plane\" (most common characters, including all major living languages) fit in one char. Characters beyond this — including emoji (😀, 🚀), rare CJK characters, and ancient scripts — require <em>two</em> chars (a \"surrogate pair\"). This means <code>char</code> is not actually a \"character\" in the human sense — it's a code unit. For text processing, use String (which handles surrogate pairs correctly) or the <code>codePoint</code> methods, not raw char operations.</p>\n\n<p>chars can be used in arithmetic (they promote to int), which is useful for character math: <code>'A' + 1</code> = 66 = <code>'B'</code>. The ASCII values every programmer should know: '0' = 48, 'A' = 65, 'a' = 97. To convert a digit char to its numeric value: <code>digit - '0'</code> (e.g., '7' - '0' = 7).</p>\n\n<h4>boolean — The Simplest Type, With a Critical Distinction</h4>\n<p>Java's boolean has exactly two values: <code>true</code> and <code>false</code>. It's a distinct type, not an integer. You cannot write <code>if (1)</code> (compile error) — the condition must be a boolean expression. This is a deliberate design decision. In C, any non-zero value is truthy, leading to bugs like <code>if (x = 5)</code> (assignment, always true) instead of <code>if (x == 5)</code> (comparison). Java prevents this entire class of errors.</p>\n\n<p>A boolean is notionally 1 bit of information, but the actual memory size is JVM-implementation-dependent — typically 1 byte (the smallest addressable unit of memory) or 4 bytes (when stored in an int-sized slot for alignment). In arrays, booleans are packed as bytes. The key takeaway: don't worry about boolean memory usage; it's irrelevant.</p>\n\n<h4>Reference Types — Pointers With Safety Guarantees</h4>\n<p>A reference variable holds a <strong>memory address</strong> — a pointer to an object on the heap. It's like a remote control: not the TV itself, but something that lets you interact with the TV. The actual object lives on the heap (a large pool of memory shared across all threads); the reference is what you hold in your local variable, field, or array element.</p>\n\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='tp'>String</span> name = <span class='st'>\"Alice\"</span>;          <span class='cm'>// name is a reference; \"Alice\" is a heap object</span>\n<span class='tp'>int</span>[] scores = {95, 87, 91};    <span class='cm'>// scores is a reference; array is a heap object</span>\n<span class='tp'>String</span> other = name;             <span class='cm'>// other now points to THE SAME object — not a copy!</span></pre></div>\n\n<p>Multiple reference variables can point to the same object. Changing the object through one reference is visible through all others — they're all looking at the same heap memory. This is the source of countless bugs when objects are mutable. For safety, prefer immutable objects (String, Integer, LocalDate, records) whose state can never change after construction.</p>\n\n<h4>Stack vs Heap — The Memory Architecture</h4>\n<p>Every Java program has two memory regions where data lives. Understanding which goes where explains a great deal about Java performance and behavior.</p>\n\n<p><strong>The Stack:</strong> Each thread has its own stack — a LIFO (last-in-first-out) data structure storing stack frames. Every method call pushes a frame containing: the method's parameters, its local variables, and the return address (where to jump back when done). When a method returns, its frame is popped and destroyed — local variables simply cease to exist. This is why you can't return a reference to a local variable (it would point to deallocated memory — Java prevents this through escape analysis, moving such objects to the heap). Stack allocation is essentially free: moving the stack pointer up or down is a single CPU instruction. The default stack size is 1MB per thread (configurable with -Xss).</p>\n\n<p><strong>The Heap:</strong> All objects (instances of classes, arrays, and their fields) live on the heap. The heap is shared across all threads, managed by the garbage collector, and can be gigabytes in size. Heap allocation is slower than stack allocation (the JVM must find free memory and update bookkeeping structures), but the garbage collector's job is to make allocation fast by keeping the heap tidy. When no references to an object remain, the object becomes eligible for garbage collection — its memory will be reclaimed eventually.</p>\n\n<p><strong>Why this matters:</strong> <code>int x = 5</code> puts the value 5 directly on the stack. <code>int[] arr = new int[5]</code> puts a reference on the stack and the 20-byte array on the heap. Accessing <code>arr[2]</code> requires following the reference to the heap — a pointer dereference that's slightly more expensive than accessing a local int (though usually negated by CPU caching). Understanding stack vs heap is essential for reasoning about object lifecycle, memory leaks (objects still referenced and therefore uncollectable), and performance optimization.</p>\n\n<h4>Default Values — What Variables Hold Before You Initialize</h4>\n<p>Java is more disciplined about initialization than most languages. The rules differ for fields and local variables:</p>\n<ul>\n  <li><strong>Instance and static fields</strong> are automatically initialized to default values: 0 for numeric types, false for boolean, null for references. This is guaranteed by the JVM — the memory is zeroed before the object is handed to your constructor.</li>\n  <li><strong>Local variables</strong> are NOT automatically initialized. The compiler enforces \"definite assignment\" — you must assign a value before using a local variable. Code like <code>int x; System.out.println(x);</code> is a compile error (\"variable x might not have been initialized\"). This prevents reading garbage memory.</li>\n</ul>\n\n<h4>Type Casting — Widening and Narrowing</h4>\n<p><strong>Widening conversions (automatic):</strong> Moving from a smaller type to a larger type is always safe — no information can be lost. The chain: byte → short → int → long → float → double. The compiler performs widening silently. Also: char → int (the Unicode code point value).</p>\n\n<p><strong>Narrowing conversions (explicit cast required):</strong> Moving from a larger type to a smaller type may lose information. The compiler forces you to acknowledge this risk with a cast operator: <code>(int) 3.14159</code> = 3 (truncation toward zero, NOT rounding). <code>(byte) 300</code> = 44 (300 - 256 = 44 — the high bits are discarded). Narrowing casts should be rare in well-designed code. When you find yourself casting frequently, reconsider your type choices.</p>\n\n<p><strong>Integer division — the #1 beginner arithmetic bug:</strong> <code>10 / 3</code> = 3 (integer division truncates). <code>10.0 / 3</code> = 3.333... (floating-point division). The type of the result is determined by the types of the operands, not by the type of the variable you're assigning to: <code>double result = 10 / 3;</code> = 3.0 (integer division happens first, then the result is widened to double). Fix: make one operand a floating-point type before the division.</p>\n\n<div class='key-point'><strong>The type system is your first line of defense against bugs.</strong> Java's static, strong typing catches at compile time what would be runtime disasters in dynamically typed languages. Use int for integers and double for floating-point by default. Use BigDecimal for money. Never compare floating-point values with ==. Understand that primitives live on the stack (fast, fixed-size, deterministic lifetime) while objects live on the heap (dynamic size, garbage-collected, potentially long-lived). The variable before the dot determines which type an operation resolves to — this is why understanding types deeply matters for every line of code you write.</div>\n\n<h4>Textbook References</h4>\n<p>Sedgewick & Wayne, <em>Introduction to Programming in Java</em>, Chapter 1.2 (Built-in Types of Data). This chapter provides a rigorous introduction to Java's type system with emphasis on the mathematical properties of each type. Horstmann, <em>Core Java Volume I</em> (12th ed), Chapter 3 (Fundamental Programming Structures in Java) covers variables, types, operators, and strings in detail with numerous practical examples.</p>\n",

    "summary": "Arithmetic, relational, logical (short-circuit), assignment operators. Precedence rules and common pitfalls like integer division.",
    "lesson": "\n<h4>Introduction: The Verbs of Programming</h4>\n<p>Operators are the action words of your programs — they perform computations on data (operands) and produce results. Java has 38 operators, but you'll use roughly 15 of them 95% of the time. Understanding not just what each operator does, but the precise rules of precedence, associativity, operand evaluation order, and type promotion, is what prevents the subtle, hard-to-spot bugs that can survive code review for years. This lesson covers every operator you'll use daily, the pitfalls that even senior developers hit, and the mental model that makes operator behavior predictable.</p>\n\n<h4>Arithmetic Operators — Beyond Elementary Math</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='tp'>int</span> a = 10, b = 3;\na + b  <span class='cm'>// 13 — addition</span>\na - b  <span class='cm'>// 7  — subtraction</span>\na * b  <span class='cm'>// 30 — multiplication</span>\na / b  <span class='cm'>// 3  — INTEGER DIVISION (truncates toward zero) — THE #1 BEGINNER BUG</span>\na % b  <span class='cm'>// 1  — remainder (result has sign of dividend: (-10) % 3 = -1)</span></pre></div>\n\n<p><strong>Integer Division in Depth:</strong> When both operands are integers, Java performs integer division — the fractional part is silently discarded (truncated toward zero). This is not a bug; it's by design. But it's the most common arithmetic surprise for programmers coming from JavaScript or Python (where / always produces floating-point). The fix is simple: make at least one operand a floating-point type before the division occurs.</p>\n\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='tp'>double</span> wrong = 10 / 3;          <span class='cm'>// 3.0 — BOTH operands are int, division produces 3, THEN widened to 3.0</span>\n<span class='tp'>double</span> right1 = 10.0 / 3;       <span class='cm'>// 3.333... — 10.0 is double, forces floating-point division</span>\n<span class='tp'>double</span> right2 = 10 / 3.0;       <span class='cm'>// 3.333... — 3.0 is double</span>\n<span class='tp'>double</span> right3 = (<span class='tp'>double</span>) 10 / 3; <span class='cm'>// 3.333... — cast before division (cast has higher precedence than /)</span></pre></div>\n\n<p>The key insight: the type of the division operation is determined by the types of its <em>operands</em>, not by the type of the variable you're assigning to. Java evaluates the right-hand side fully before considering the assignment. This \"evaluate right, then assign left\" rule applies to all expressions.</p>\n\n<p><strong>The Remainder Operator (%) — More Useful Than It Seems:</strong> The remainder operator has applications far beyond \"is this number even?\":</p>\n<ul>\n  <li><strong>Wrap-around indexing:</strong> <code>index % arrayLength</code> ensures an index stays within bounds (circular buffers, ring buffers)</li>\n  <li><strong>Extract digits:</strong> <code>n % 10</code> gives the last digit; <code>n / 10</code> removes it (used in digit-by-digit algorithms)</li>\n  <li><strong>Clock arithmetic:</strong> <code>(hour + offset) % 12</code> handles 12-hour time wrapping</li>\n  <li><strong>Hash table buckets:</strong> <code>hashCode % tableSize</code> distributes keys across buckets (though bit masking with power-of-two sizes is faster)</li>\n  <li><strong>Divisibility:</strong> <code>n % k == 0</code> is more readable than <code>n / k * k == n</code></li>\n</ul>\n<p>Java's % is a <strong>remainder</strong> operator, not a mathematical modulo. For negative numbers: (-10) % 3 = -1 (same sign as dividend). A true modulo would give 2. Use <code>Math.floorMod(-10, 3)</code> for mathematical modulo (returns 2).</p>\n\n<h4>Arithmetic Type Promotion — When Types Mix</h4>\n<p>When an expression mixes types (e.g., int + double), Java automatically <strong>promotes</strong> the narrower type to the wider type before performing the operation. The promotion hierarchy: byte → short → int → long → float → double. Every arithmetic operation on integers smaller than int promotes both operands to int first. This is why <code>byte a = 1; byte b = 2; byte c = a + b;</code> fails to compile — a + b promotes to int, and you can't assign an int to a byte without a cast.</p>\n\n<h4>Comparison Operators — The Foundation of Decision-Making</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre>a == b  <span class='cm'>// Equal to — VALUE comparison for primitives, REFERENCE comparison for objects!</span>\na != b  <span class='cm'>// Not equal to</span>\na > b   <span class='cm'>// Greater than</span>\na < b   <span class='cm'>// Less than</span>\na >= b  <span class='cm'>// Greater than or equal</span>\na <= b  <span class='cm'>// Less than or equal</span></pre></div>\n\n<p><strong>The == Trap — The Most Expensive Two Characters in Java:</strong> For primitive types, <code>==</code> compares <em>values</em> (as any reasonable person expects). For reference types, <code>==</code> compares <em>memory addresses</em> — it asks \"do these two references point to the exact same object on the heap?\", not \"do these two objects have the same content?\" For content comparison, use <code>.equals()</code>.</p>\n\n<p>This is especially treacherous with Strings because of <strong>string interning</strong>. The JVM maintains a pool of string literals. Two identical string literals in source code resolve to the same object in the pool, making <code>==</code> accidentally work — creating false confidence. But <code>new String(\"hello\") == \"hello\"</code> is false (different objects, same content). And user input, file contents, and network data are never interned. The rule is absolute: <strong>always use .equals() for String comparison, never ==.</strong></p>\n\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='tp'>String</span> a = <span class='st'>\"hello\"</span>;\n<span class='tp'>String</span> b = <span class='st'>\"hello\"</span>;\nSystem.out.println(a == b);       <span class='cm'>// true — SAME interned object (misleading!)</span>\n\n<span class='tp'>String</span> c = <span class='kw'>new</span> <span class='tp'>String</span>(<span class='st'>\"hello\"</span>);   <span class='cm'>// Explicitly creates NEW object — bypasses interning</span>\nSystem.out.println(a == c);       <span class='cm'>// false — different objects, same content</span>\nSystem.out.println(a.equals(c));  <span class='cm'>// true — compares characters</span></pre></div>\n\n<h4>Logical Operators — Combining Boolean Expressions</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// && (AND) — true only if BOTH operands are true</span>\n<span class='kw'>if</span> (age >= 18 && hasLicense) { allowDrive(); }\n\n<span class='cm'>// || (OR) — true if EITHER operand is true (or both)</span>\n<span class='kw'>if</span> (isAdmin || isModerator) { grantAccess(); }\n\n<span class='cm'>// ! (NOT) — inverts the boolean value</span>\n<span class='kw'>if</span> (!isBanned) { allowPost(); }\n\n<span class='cm'>// ^ (XOR) — true if operands DIFFER (one true, one false)</span>\n<span class='kw'>if</span> (isWeekend ^ isHoliday) { specialHours(); }  <span class='cm'>// Not both, not neither</span></pre></div>\n\n<h4>Short-Circuit Evaluation — The Hidden Safety Net</h4>\n<p>Java's <code>&&</code> and <code>||</code> are <strong>short-circuit operators</strong>: the right operand is evaluated <em>only if the left operand doesn't determine the result</em>. For <code>&&</code>, if the left is false, the result is false regardless of the right — so the right is skipped. For <code>||</code>, if the left is true, the result is true regardless of the right. This is not just a performance micro-optimization — it's a fundamental safety mechanism that prevents NullPointerExceptions:</p>\n\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='cm'>// SAFE: .equals() only executes if obj is NOT null</span>\n<span class='kw'>if</span> (obj != <span class='kw'>null</span> && obj.equals(target)) { ... }\n\n<span class='cm'>// SAFE: division only executes if denominator is NOT zero</span>\n<span class='kw'>if</span> (denom != 0 && num / denom > threshold) { ... }\n\n<span class='cm'>// SAFE: array access only if index is in bounds</span>\n<span class='kw'>if</span> (index >= 0 && index < arr.length && arr[index] > 0) { ... }</pre></div>\n\n<p>The non-short-circuit versions (<code>&</code> and <code>|</code>) always evaluate both operands. They have two niche uses: (1) bitwise operations on integers, (2) when the right operand has a required side effect. In practice, you'll almost always want <code>&&</code> and <code>||</code>.</p>\n\n<h4>Assignment Operators — Shorthand That Prevents Errors</h4>\n<div class='code-block'><span class='lang-tag'>java</span><pre>x += 5;   <span class='cm'>// x = x + 5</span>\nx -= 3;   <span class='cm'>// x = x - 3</span>\nx *= 2;   <span class='cm'>// x = x * 2</span>\nx /= 4;   <span class='cm'>// x = x / 4</span>\nx %= 7;   <span class='cm'>// x = x % 7</span>\nx++;      <span class='cm'>// x = x + 1 (post-increment: returns old value, then increments)</span>\n++x;      <span class='cm'>// x = x + 1 (pre-increment: increments, then returns new value)</span></pre></div>\n\n<p>Compound assignment operators (<code>+=</code>, <code>-=</code>, etc.) have an important hidden feature: they include an implicit cast. <code>byte b = 1; b = b + 1;</code> fails to compile (b + 1 promotes to int). <code>byte b = 1; b += 1;</code> compiles fine (the implicit cast handles narrowing). This is occasionally useful but more often surprising — explicit casts are clearer.</p>\n\n<h4>Operator Precedence — The Complete Table</h4>\n<p>When multiple operators appear in a single expression, precedence determines the order of evaluation. The full Java precedence table has 16 levels. Here are the ones that actually matter daily:</p>\n\n<table class='meta-table'>\n  <tr><th>Precedence</th><th>Operators</th><th>Associativity</th></tr>\n  <tr><td>1 (highest)</td><td><code>()</code> parentheses, <code>[]</code> array access, <code>.</code> member access</td><td>Left-to-right</td></tr>\n  <tr><td>2</td><td><code>++ --</code> (postfix)</td><td>Left-to-right</td></tr>\n  <tr><td>3</td><td><code>++ -- + - ! ~</code> (prefix unary)</td><td>Right-to-left</td></tr>\n  <tr><td>4</td><td><code>()</code> cast, <code>new</code></td><td>Right-to-left</td></tr>\n  <tr><td>5</td><td><code>* / %</code></td><td>Left-to-right</td></tr>\n  <tr><td>6</td><td><code>+ -</code> (addition/subtraction)</td><td>Left-to-right</td></tr>\n  <tr><td>8</td><td><code>&lt; &lt;= &gt; &gt;= instanceof</code></td><td>Left-to-right</td></tr>\n  <tr><td>9</td><td><code>== !=</code></td><td>Left-to-right</td></tr>\n  <tr><td>12</td><td><code>&&</code></td><td>Left-to-right</td></tr>\n  <tr><td>13</td><td><code>||</code></td><td>Left-to-right</td></tr>\n  <tr><td>15</td><td><code>= += -= *= /= %=</code></td><td>Right-to-left</td></tr>\n</table>\n\n<p>The most commonly misjudged precedence: <code>&&</code> binds tighter than <code>||</code> (like <code>*</code> over <code>+</code>). <code>a || b && c</code> is <code>a || (b && c)</code>, not <code>(a || b) && c</code>. <strong>When in doubt — or whenever an expression spans more than ~10 characters — use parentheses.</strong> They cost nothing at runtime and prevent bugs. The compiler doesn't care about your clever precedence knowledge; the next developer reading your code will thank you.</p>\n\n<h4>Bitwise Operators — When You Need to Talk to the Hardware</h4>\n<p>Java inherits C's bitwise operators for low-level bit manipulation. These are essential for embedded systems, cryptography, graphics programming, and performance-critical code. In business applications, you'll rarely need them directly, but understanding them helps you understand how computers work at the metal.</p>\n<div class='code-block'><span class='lang-tag'>java</span><pre><span class='tp'>int</span> flags = 0b1010;\nflags & 0b0100  <span class='cm'>// 0 — bitwise AND (both 1 → 1). Used to CHECK if a bit is set.</span>\nflags | 0b0100  <span class='cm'>// 0b1110 — bitwise OR (either 1 → 1). Used to SET bits.</span>\nflags ^ 0b1111  <span class='cm'>// 0b0101 — bitwise XOR (different → 1). Used to TOGGLE bits.</span>\n~flags          <span class='cm'>// ~0b...1010 = 0b...0101 — bitwise NOT (flip all bits)</span>\nflags << 2      <span class='cm'>// 0b101000 — left shift (multiply by 2ⁿ). Fills right with zeros.</span>\nflags >> 2      <span class='cm'>// 0b10 — arithmetic right shift (divide by 2ⁿ). Fills left with sign bit.</span>\nflags >>> 2     <span class='cm'>// 0b10 — logical right shift. Fills left with zeros regardless of sign.</span></pre></div>\n\n<div class='key-point'><strong>Operator mastery in one sentence:</strong> Use parentheses when there's any doubt about precedence; use .equals() for object content comparison, never ==; rely on short-circuit evaluation for null-safety; use BigDecimal for money; and remember that integer division truncates silently. These five rules prevent 90% of operator-related bugs.</div>\n",
